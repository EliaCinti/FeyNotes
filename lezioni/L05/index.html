        title: "L'Equazione della Traiettoria $y(x)$",
        icon: "📐",
        content: `<p>Le leggi orarie $x(t)$ e $y(t)$ descrivono <em>dove</em> si trova il corpo istante per istante. Ma se eliminiamo il tempo $t$, otteniamo la <strong>forma della curva</strong> disegnata nello spazio — l'equazione della <strong>traiettoria</strong>.</p>
<p>Dalle leggi orarie del proiettile ($x_0 = 0$, $y_0 = 0$):</p>
<p>$$x(t) = (v_0\\cos\\theta)\\,t \\qquad \\Rightarrow \\qquad t = \\frac{x}{v_0\\cos\\theta}$$</p>
<p>Sostituendo nella $y(t)$:</p>`,

        formulas: [
          { label: "Equazione della traiettoria", latex: "y = \\tan(\\theta)\\,x - \\frac{g}{2\\,v_0^2\\cos^2\\theta}\\,x^2" }
        ],

        extra_content: `<p>Questa è una <strong>parabola</strong> con la concavità verso il basso (il coefficiente di $x^2$ è negativo). La traiettoria è <em>parametrica rispetto a $\\theta$</em>: cambiando l'angolo, cambia la parabola.</p>
<p>Dai tuoi appunti: <em>"io ti do il valore di un asse e tu mi dai quello rispettivo dell'altro asse"</em>.</p>`,

<p>$$0 = x\\left(\\tan\\theta - \\frac{g}{2v_0^2\\cos^2\\theta}\\,x\\right)$$</p>
<p>Le due soluzioni sono $x = 0$ (partenza) e il punto di caduta:</p>
<p>$$x_c = \\frac{2v_0^2\\sin\\theta\\cos\\theta}{g} = \\frac{v_0^2\\sin(2\\theta)}{g}$$</p>`

<p>$$\\theta = 45° = \\frac{\\pi}{4} \\qquad \\Rightarrow \\qquad x_c^{\\text{max}} = \\frac{v_0^2}{g}$$</p>

        title: "Scomposizione Intrinseca dell'Accelerazione: Dimostrazione Completa",
        icon: "🔀",
        content: `<p>Finora abbiamo scomposto $\\vec{a}$ lungo gli assi cartesiani ($a_x$, $a_y$, $a_z$). Ma esiste un modo più fisico: scomporre $\\vec{a}$ lungo la <strong>direzione del moto</strong> (tangente) e la direzione <strong>perpendicolare</strong> (normale). Vediamo come arrivarci <strong>passo per passo</strong>.</p>`,

        subsections: [
          {
            subtitle: "Passo 1: Riscrivere $\\vec{v}$ in termini del versore tangente",
            content: `<p>La velocità istantanea è sempre tangente alla traiettoria. Possiamo scriverla come il prodotto del suo modulo per il versore tangente:</p>
<p>$$\\vec{v} = v\\,\\hat{u}_T$$</p>
<p>Dove $v = |\\vec{v}|$ è la rapidità (scalare positivo) e $\\hat{u}_T$ è il versore tangente alla traiettoria nel punto considerato (modulo 1, direzione della traiettoria, verso del moto).</p>`
          },
          {
            subtitle: "Passo 2: Derivare $\\vec{v}$ usando la regola del prodotto",
            content: `<p>L'accelerazione è la derivata della velocità. Siccome $\\vec{v} = v \\cdot \\hat{u}_T$ è un prodotto di due funzioni del tempo (sia $v$ che $\\hat{u}_T$ possono cambiare!), applichiamo la <strong>regola del prodotto</strong> (Leibniz):</p>
<p>$$\\vec{a} = \\frac{d\\vec{v}}{dt} = \\frac{d(v\\,\\hat{u}_T)}{dt} = \\frac{dv}{dt}\\,\\hat{u}_T + v\\,\\frac{d\\hat{u}_T}{dt}$$</p>
<p>Il primo termine è facile: $\\frac{dv}{dt}$ è la derivata del modulo, moltiplicata per $\\hat{u}_T$. Il secondo termine è il problema: <strong>qual è la derivata di un versore?</strong></p>`
          },
          {
            subtitle: "Passo 3: La derivata del versore tangente $d\\hat{u}_T/dt$",
            content: `<p>Questo è il <strong>passaggio chiave</strong> della dimostrazione. Il versore $\\hat{u}_T$ ha modulo costante ($|\\hat{u}_T| = 1$ sempre), ma <strong>cambia direzione</strong> quando la traiettoria curva.</p>
<p><strong>Proprietà fondamentale</strong>: la derivata di un vettore di modulo costante è <strong>perpendicolare</strong> al vettore stesso. Quindi $d\\hat{u}_T$ è perpendicolare a $\\hat{u}_T$ — punta nella direzione <strong>normale</strong> $\\hat{u}_N$.</p>
<p>Si può scrivere:</p>
<p>$$d\\hat{u}_T = |d\\hat{u}_T|\\,\\hat{u}_N = d\\phi\\,\\hat{u}_N$$</p>
<p>Dove $d\\phi$ è l'angolo infinitesimo di cui ruota la tangente alla traiettoria (lo vedi nel disegno dei tuoi appunti: la differenza tra $\\hat{u}_T(t)$ e $\\hat{u}_T(t+dt)$ tende ad essere ortogonale alla traiettoria quando $\\Delta t \\to 0$).</p>`
          },
          {
            subtitle: "Passo 4: Collegare $d\\phi/dt$ alla velocità e al raggio di curvatura",

<p>L'arco infinitesimo percorso è legato all'angolo dalla relazione geometrica:</p>
<p>$$ds = \\rho\\,d\\phi \\qquad \\Rightarrow \\qquad d\\phi = \\frac{ds}{\\rho}$$</p>
<p>Dividendo per $dt$:</p>
<p>$$\\frac{d\\phi}{dt} = \\frac{1}{\\rho}\\,\\frac{ds}{dt} = \\frac{v}{\\rho}$$</p>
<p>Dove abbiamo usato $v = ds/dt$ (la velocità è la derivata dell'arco percorso rispetto al tempo).</p>`
          },
          {
            subtitle: "Passo 5: Mettere tutto insieme",
            content: `<p>Sostituendo $\\frac{d\\hat{u}_T}{dt} = \\frac{d\\phi}{dt}\\hat{u}_N = \\frac{v}{\\rho}\\hat{u}_N$ nell'espressione del Passo 2:</p>
<p>$$\\vec{a} = \\frac{dv}{dt}\\,\\hat{u}_T + v \\cdot \\frac{v}{\\rho}\\,\\hat{u}_N$$</p>
<p>Cioè:</p>`,
            equations: [
              "\\boxed{\\vec{a} = \\underbrace{\\frac{dv}{dt}\\,\\hat{u}_T}_{\\vec{a}_T\\text{ (tangenziale)}} + \\underbrace{\\frac{v^2}{\\rho}\\,\\hat{u}_N}_{\\vec{a}_N\\text{ (normale)}}}"
            ]
          },

            subtitle: "Riepilogo dei simboli",
            content: `<p>• $v = |\\vec{v}|$ — modulo della velocità (rapidità)</p>
<p>• $\\hat{u}_T$ — versore tangente alla traiettoria (nella direzione del moto)</p>
<p>• $\\hat{u}_N$ — versore normale, perpendicolare a $\\hat{u}_T$, diretto verso il <strong>centro di curvatura</strong></p>
<p>• $\\rho$ — raggio di curvatura (raggio della circonferenza osculatrice nel punto)</p>
<p>• $d\\phi$ — angolo infinitesimo di rotazione della tangente</p>
<p>• $ds$ — arco infinitesimo percorso ($ds = \\rho\\,d\\phi$, $v = ds/dt$)</p>`
          }
        ],

        formulas: [
          { label: "Accelerazione totale", latex: "\\vec{a} = \\vec{a}_T + \\vec{a}_N = \\frac{dv}{dt}\\,\\hat{u}_T + \\frac{v^2}{\\rho}\\,\\hat{u}_N" },
          { label: "Componente tangenziale", latex: "a_T = \\frac{dv}{dt} \\quad \\text{(varia il modulo di } \\vec{v}\\text{)}" },
          { label: "Componente normale", latex: "a_N = \\frac{v^2}{\\rho} \\quad \\text{(varia la direzione di } \\vec{v}\\text{)}" },
          { label: "Perpendicolarità", latex: "\\vec{a}_T \\perp \\vec{a}_N \\quad \\Rightarrow \\quad |\\vec{a}| = \\sqrt{a_T^2 + a_N^2}" }
        ]
      },

        front: "Deriva l'equazione della traiettoria $y(x)$ del proiettile ed esprimi la <strong>gittata</strong>. Dimostra per quale $\\theta$ è massima.",
        back: "Da $x = (v_0\\cos\\theta)t$ si ricava $t = x/(v_0\\cos\\theta)$. Sostituendo in $y(t)$: $$y = \\tan\\theta\\,x - \\frac{g}{2v_0^2\\cos^2\\theta}x^2$$ Ponendo $y = 0$: $x_c = \\frac{v_0^2\\sin(2\\theta)}{g}$. Il max di $\\sin(2\\theta)$ è 1 per $2\\theta = 90°$, cioè $\\theta = 45°$: $$x_c^{\\max} = \\frac{v_0^2}{g} \\quad \\blacksquare$$"
      },
      {
        type: "dimostrazione",
        front: "🚨 <strong>DOMANDA ORALE</strong>: Dimostra la formula $\\vec{a} = \\frac{dv}{dt}\\hat{u}_T + \\frac{v^2}{\\rho}\\hat{u}_N$ partendo da $\\vec{v} = v\\hat{u}_T$. Spiega ogni passaggio.",
        back: "<strong>1)</strong> Scrivo $\\vec{v} = v\\,\\hat{u}_T$. <strong>2)</strong> Derivo con Leibniz: $$\\vec{a} = \\frac{dv}{dt}\\hat{u}_T + v\\frac{d\\hat{u}_T}{dt}$$ <strong>3)</strong> Passo chiave: $\\hat{u}_T$ ha modulo 1 costante → la sua derivata è <strong>⊥</strong> a sé stesso → punta nella direzione normale: $d\\hat{u}_T = d\\phi\\,\\hat{u}_N$. <strong>4)</strong> Arco infinitesimo: $ds = \\rho\\,d\\phi$ → $\\frac{d\\phi}{dt} = \\frac{1}{\\rho}\\frac{ds}{dt} = \\frac{v}{\\rho}$. <strong>5)</strong> Sostituisco: $$\\vec{a} = \\frac{dv}{dt}\\hat{u}_T + \\frac{v^2}{\\rho}\\hat{u}_N \\quad \\blacksquare$$"
      },
      {
        type: "definizione",
        front: "Cosa sono l'<strong>accelerazione tangenziale</strong> e l'<strong>accelerazione normale</strong>? Scrivi le formule.",
        back: "$a_T = \\frac{dv}{dt}$: varia il <strong>modulo</strong> della velocità (rapidità). È lungo la tangente alla traiettoria.<br>$a_N = \\frac{v^2}{\\rho}$: varia la <strong>direzione</strong> del moto. Punta verso il centro di curvatura.<br>$\\vec{a} = \\vec{a}_T + \\vec{a}_N$ con $\\vec{a}_T \\perp \\vec{a}_N$."
      },
      {
        type: "definizione",
        front: "Cos'è la <strong>circonferenza osculatrice</strong> e il <strong>raggio di curvatura</strong> $\\rho$?",
        back: "In ogni punto di una curva, la circonferenza osculatrice è il cerchio che meglio approssima la curva localmente (la \"bacia\"). Il suo raggio è $\\rho$.<br>• $\\rho$ piccolo → curva stretta → $a_N$ grande.<br>• $\\rho \\to \\infty$ → rettilineo → $a_N = 0$."
      },
      {
        type: "definizione",
        front: "Definisci la <strong>velocità angolare</strong> $\\omega$ e la relazione con la velocità lineare.",
        back: "$$\\omega = \\frac{d\\theta}{dt}$$ Legame con la velocità lineare: $v = R\\omega$ (dove $R$ è il raggio della traiettoria circolare). L'accelerazione centripeta si riscrive: $a_N = R\\omega^2$."
      },
      {
        type: "domanda",
        front: "Come si classifica un moto in base a $a_T$ e $a_N$? Fai 4 esempi.",
        back: "• <strong>Rettilineo uniforme</strong>: $a_T = 0$, $a_N = 0$ → $\\vec{a} = 0$.<br>• <strong>Rettilineo vario</strong>: $a_T \\neq 0$, $a_N = 0$ → $\\vec{a} = \\vec{a}_T$.<br>• <strong>Curvilineo uniforme</strong>: $a_T = 0$, $a_N \\neq 0$ → $\\vec{a} = \\vec{a}_N$.<br>• <strong>MCU</strong>: $a_T = 0$, $a_N = v^2/R = \\text{cost}$ → centripeta."
      },
      {
        type: "domanda",
        front: "Perché raddoppiando $v_0$ la gittata <strong>quadruplica</strong>?",
        back: "Dalla formula $x_c = \\frac{v_0^2 \\sin(2\\theta)}{g}$, la gittata dipende dal <strong>quadrato</strong> di $v_0$. Se $v_0 \\to 2v_0$: $$x_c \\to \\frac{(2v_0)^2}{g}\\sin(2\\theta) = 4\\cdot\\frac{v_0^2}{g}\\sin(2\\theta)$$"
      },
      {
        type: "tranello",
        front: "Nel moto circolare uniforme, l'accelerazione è costante?",
        back: "<strong>No!</strong> Il <strong>modulo</strong> $|\\vec{a}| = v^2/R$ è costante, ma il <strong>vettore</strong> $\\vec{a}$ cambia continuamente direzione (punta sempre verso il centro). Quindi $\\vec{a} \\neq \\text{cost}$ e NON puoi usare le formule del MUA."
      },
      {
        type: "tranello",
        front: "Se $a_T = 0$ il corpo è fermo?",
        back: "<strong>No!</strong> $a_T = 0$ significa solo che il <strong>modulo</strong> della velocità non cambia ($dv/dt = 0$). Il corpo può muoversi a velocità costante e stare curvando ($a_N \\neq 0$). Esempio: MCU — velocità tachimetrica costante ma il corpo gira in cerchio."
      },
      {
        type: "tranello",
        front: "Come si ricava $a_N$ se conosci $\\vec{a}$ e $a_T$?",
        back: "Poiché $\\vec{a}_T \\perp \\vec{a}_N$, il teorema di Pitagora dà: $$a^2 = a_T^2 + a_N^2 \\quad \\Rightarrow \\quad a_N = \\sqrt{a^2 - a_T^2}$$ E da questo si può ricavare il raggio di curvatura: $\\rho = v^2/a_N$."
      }
    ]
  };

</script>
