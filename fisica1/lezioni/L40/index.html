            content: `<p>Consideriamo un disco (o cilindro) omogeneo di raggio $R$ e massa $M$ che rotola su un piano orizzontale. Chiamiamo $C$ il punto di contatto.</p>
<blockquote>«Supponiamo che questo cilindro sia un cilindro omogeneo. La ruota tipicamente non è omogenea, perché ha una distribuzione di massa simmetrica sì, ma radiale: dal centro vi spostate verso il bordo e la densità cambia. Però noi, per semplicità, consideriamo la ruota come un disco omogeneo.»</blockquote>
<p>Se il disco è omogeneo, il suo centro di massa coincide col centro geometrico. In un intervallino di tempo infinitesimo $dt$, possiamo pensare che il punto di contatto $C$ rimanga fermo e che la ruota compia una piccola rotazione infinitesima $d\\theta$ attorno a un asse istantaneo passante per $C$. All'istante successivo ci si è spostati di un $dx$ più avanti e si ripete una nuova rotazione infinitesima attorno al nuovo punto di contatto.</p>
<p>L'avanzamento finito della ruota si descrive come una successione di infiniti avanzamenti infinitesimi, ognuno dei quali è una pura rotazione attorno a un asse istantaneo passante per il punto di contatto.</p>
<p>Il fatto che non ci sia scivolamento relativo tra il punto di contatto della ruota e il piano è proprio la <strong>condizione di puro rotolamento</strong>:</p>

<p>Nell'intervallino $dt$, il centro di massa percorre un piccolo arco di lunghezza $ds$, corrispondente alla rotazione di angolo $d\\theta$ attorno a $C$. Siccome il centro di massa dista $R$ dall'asse istantaneo di rotazione:</p>
<p>$$ds = R\\, d\\theta$$</p>
<p>Ora, $v_{CM}$ in modulo è $ds/dt$, quindi:</p>
<p>$$v_{CM} = \\frac{ds}{dt} = R\\,\\frac{d\\theta}{dt}$$</p>
<p>Ma $d\\theta/dt$ è semplicemente $\\omega_C$, e allora:</p>
<p>$$v_{CM} = \\omega_C\\, R$$</p>`

<p>Qualunque spostamento infinitesimo di un corpo rigido si può sempre descrivere come combinazione di una traslazione infinitesima e di una rotazione infinitesima attorno a un asse istantaneo. L'energia cinetica del corpo rigido, per il teorema di König, si scompone in:</p>

<p>$$\\omega_C R = v_{CM} = \\omega_{CM} R \\quad\\Longrightarrow\\quad \\omega_C = \\omega_{CM} \\equiv \\omega$$</p>
<p>Nel puro rotolamento la velocità angolare è la stessa nelle due descrizioni. La chiameremo semplicemente $\\omega$ del puro rotolamento.</p>`

</ul>
<blockquote>«Tant'è vero che alcuni pezzetti di quel sistema, ruotando intorno a $C$, distano fino a $2R$ dall'asse di rotazione, mentre nel caso della rotazione attorno al centro di massa la distanza massima è $R$. Quindi mi devo pure aspettare, facendo due conti, che il momento di inerzia rispetto al centro di massa sia più piccolo. Col teorema di Huygens-Steiner, se vi siete scritti sul fogliettino la formula del momento di inerzia rispetto al centro di massa, ve la calcolate subito per qualunque altro asse parallelo: basta che aggiungete $MR^2$.»</blockquote>`

<p>$$\\vec{M}_O = \\sum_i \\vec{r}_i \\wedge \\vec{F}_i$$</p>
<p>ed è ben definito. Ma in generale non esiste un punto $C$ tale che $\\vec{r}_C \\wedge \\vec{F}_R = \\vec{M}_O$.</p>
<p>Un esempio intuitivo: se il polo $O$ è un chiodo a cui è appeso un corpo rigido e si tira il corpo lungo un asse che passa per il chiodo, non ruota niente (momento nullo). Se invece si applica la stessa forza su una retta che non passa per $O$, il braccio è diverso da zero e il corpo gira.</p>`,

<p>Per un corpo rigido soggetto a un sistema di forze parallele $\\vec{F}_i$, tutte con la stessa direzione, esiste un punto $C$, detto <strong>centro delle forze</strong>, tale che, applicando in $C$ la risultante $\\vec{F}_R = \\sum_i \\vec{F}_i$, si ha:</p>
<p>$$\\vec{M}_O = \\vec{R}_C \\wedge \\vec{F}_R$$</p>
<p>per ogni polo $O$. La posizione di $C$ è data da:</p>

        back: "Perché le forze peso $m_i\\vec{g}$ formano un sistema di forze parallele e costanti. Per tali sistemi esiste un centro delle forze, e nel caso del peso questo centro coincide con il centro di massa (baricentro): $\\vec{M}_O^{(P)} = \\vec{R}_{CM} \\wedge M\\vec{g}$. Non è una proprietà generale: vale solo per sistemi di forze parallele."
      },
      {
        type: "formula",
        front: "Qual è il periodo delle piccole oscillazioni del pendolo composto?",
        back: "$T = 2\\pi\\sqrt{\\frac{I_O}{Mgh}} = 2\\pi\\sqrt{\\frac{L^*}{g}}$, dove $L^* = \\frac{I_O}{Mh}$ è la lunghezza ridotta, $I_O$ è il momento di inerzia rispetto al perno e $h$ è la distanza perno–centro di massa."
      },
      {
        type: "dimostrazione",
        front: "Come si ricava l'equazione del pendolo composto per piccole oscillazioni?",
        back: "Si scrive l'equazione dei momenti rispetto al perno $O$: $I_O \\ddot\\theta = -Mgh\\sin\\theta$. Per piccole oscillazioni ($\\sin\\theta \\simeq \\theta$) diventa $\\ddot\\theta + \\frac{Mgh}{I_O}\\theta = 0$, che è l'equazione dell'oscillatore armonico con $\\omega^2 = \\frac{Mgh}{I_O}$."
      },
      {
        type: "domanda",
        front: "Nell'urto tra un punto materiale e una sbarra vincolata a un perno, cosa si conserva e perché?",
        back: "Si conserva il <strong>momento angolare rispetto al perno $O$</strong>: $L_{O,\\text{prima}} = L_{O,\\text{dopo}}$. La quantità di moto totale NON si conserva perché il vincolo esercita una forza impulsiva. Scegliendo $O$ come polo, la reazione vincolare ha momento nullo."
      },
      {
        type: "definizione",
        front: "Quali sono le condizioni di equilibrio statico per un corpo rigido?",
        back: "$\\sum \\vec{F}^{\\,ext} = \\vec{0}$ (risultante nulla) e $\\sum \\vec{M}^{\\,ext}_O = \\vec{0}$ (momento risultante nullo rispetto a un polo qualunque). Valgono le equazioni cardinali, ma con accelerazione nulla."
      },
      {
        type: "tranello",
        front: "Nei problemi di statica, la scelta del polo per i momenti influenza il risultato?",
        back: "No, il risultato non dipende dal polo. Tuttavia una scelta oculata semplifica i conti: conviene scegliere come polo un punto in cui agiscono forze incognite che non si vogliono calcolare, così il loro momento è automaticamente nullo."
      },
      {
        type: "domanda",
        front: "Quali sono i tre pilastri per risolvere qualunque problema di meccanica del corpo rigido?",
        back: "1) Prima equazione cardinale: $\\sum \\vec{F}^{\\,ext} = M\\vec{a}_{CM}$. 2) Seconda equazione cardinale: $\\sum \\vec{M}^{\\,ext} = \\frac{d\\vec{L}}{dt}$. 3) Bilancio dell'energia meccanica. Forze, momenti ed energia — non affidarsi mai alla sola intuizione."
      }
    ]
};
