<p>Se il disco è omogeneo, il suo centro di massa coincide col centro geometrico. Consideriamo un intervallino di tempo infinitesimo $dt$: in quell'intervallino, il punto di contatto $C$ rimane fermo e la ruota compie una piccola rotazione infinitesima $d\\theta$ attorno a un asse istantaneo passante per $C$. All'istante successivo ci si sposta di un $dx$ più avanti e si ripete una nuova rotazione infinitesima attorno al nuovo punto di contatto.</p>

<p>Se calcolo la risultante $\\vec{F}_R = \\sum_i \\vec{F}_i$, dove la applico? Non c'è un punto univoco. Se la applico in punti diversi, ottengo momenti diversi rispetto a $O$. Il momento risultante, invece, va calcolato <strong>sommando i momenti delle singole forze</strong>:</p>
<p>$$\\vec{M}_O = \\sum_i \\vec{r}_i \\wedge \\vec{F}_i$$</p>
<p>ed è ben definito. Ma in generale non esiste un punto $C$ tale che $\\vec{r}_C \\wedge \\vec{F}_R = \\vec{M}_O$.</p>
<p>Esempio intuitivo: se il polo $O$ è un chiodo e tiro il corpo lungo un asse che passa per il chiodo, non ruota niente (momento nullo). Se applico la stessa forza su una retta che non passa per $O$, il braccio è diverso da zero e il corpo gira.</p>`,

<p>Esiste un punto $C$, detto <strong>centro delle forze</strong>, tale che applicando in $C$ la risultante $\\vec{F}_R = \\sum_i \\vec{F}_i$ si ha:</p>
<p>$$\\vec{M}_O = \\vec{R}_C \\wedge \\vec{F}_R$$</p>
<p>per ogni polo $O$. La posizione di $C$ è:</p>
<p>$$\\vec{R}_C = \\frac{\\sum_i F_i\\, \\vec{R}_i}{\\sum_i F_i}$$</p>

<p>Di conseguenza, per il momento risultante delle forze peso rispetto a un polo $O$ qualunque:</p>
<p>$$\\vec{M}_O^{\\,(P)} = \\vec{R}_{CM} \\wedge M\\vec{g}$$</p>
<blockquote>«Da adesso in poi, ogni volta che dovrete fare un problema in cui rispetto a un certo polo vi dovete calcolare il momento risultante — che di solito sono conti rognosi, rognosissimi — nel caso della forza peso diventa facilissimo. Se conosco la massa, conosco la risultante delle forze peso $M\\vec{g}$, e se conosco il centro di massa, il momento rispetto a un polo qualunque è dato da quella formula lì. Ma non è una cosa generale: è una cosa super particolare. La posso scrivere solo perché il sistema di forze è parallelo e costante.»</blockquote>`

<p>Sul corpo agiscono:</p>
<ul>
<li>La forza peso totale $M\\vec{g}$, applicata al centro di massa (per il risultato sul baricentro).</li>

<p>$$M_O = -Mgh\\sin\\theta$$</p>
<p>L'equazione dei momenti per le rotazioni attorno all'asse fisso per $O$:</p>

<p><strong>Forze in gioco:</strong></p>
<ul>
<li>Peso $M\\vec{g}$ applicato al centro di massa (punto medio).</li>
<li>In $A$ (muro liscio): reazione normale $\\vec{N}_A$, orizzontale.</li>
<li>In $B$ (pavimento con attrito): reazione normale $N_B$ verticale e forza di attrito $f_B$ orizzontale.</li>

<p>$$N_B = Mg, \\qquad N_A = f_B = \\frac{Mg}{2\\tan\\theta}$$</p>
<p><strong>Condizione di non slittamento:</strong></p>
<p>$$f_B \\le \\mu_S N_B \\;\\Longrightarrow\\; \\frac{Mg}{2\\tan\\theta} \\le \\mu_S Mg \\;\\Longrightarrow\\; \\tan\\theta \\ge \\frac{1}{2\\mu_S}$$</p>
