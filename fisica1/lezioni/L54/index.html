            icon: "🔋",
            content: `<p>Le considerazioni svolte in precedenza sull'irreversibilità si estendono al caso generale in cui il sistema scambia calore con più sorgenti, anche con $N \\gt 2$ sorgenti. Confrontando una trasformazione reale (irreversibile) con la corrispondente trasformazione reversibile tra gli stessi stati estremi, si osserva che la differenza tra il lavoro reversibile e quello irreversibile è proporzionale alla variazione di entropia dell'universo termodinamico:</p>
<p>$$|W_{\\text{rev}} - W_{\\text{irr}}| \\propto \\Delta S_U$$</p>

            content: `<p>Finora abbiamo rappresentato le trasformazioni termodinamiche di un gas nel <strong>piano di Clapeyron</strong> $p$-$V$, dove l'area sottesa da una curva $A \\to B$ rappresenta il lavoro scambiato lungo la trasformazione:</p>

<p>da cui, integrando lungo una trasformazione reversibile da $A$ a $B$:</p>

            content: `<p>Per calcolare la variazione di entropia dell'universo termodinamico:</p>
<p>$$\\Delta S_U = \\Delta S_{\\text{amb}} + \\Delta S_{\\text{sist}}$$</p>
<p>Il punto cruciale è che, per calcolare $\\Delta S$, si deve scegliere una trasformazione <strong>reversibile</strong> che colleghi gli stessi stati iniziale e finale della trasformazione reale, anche se quest'ultima è irreversibile: l'entropia è una <strong>funzione di stato</strong>, quindi $\\Delta S$ dipende solo dagli stati estremi.</p>
<p>Il procedimento è sempre lo stesso:</p>
<ol>

<li>Si calcola $\\Delta S = \\int (dQ/T)_{\\text{rev}}$ lungo tale trasformazione.</li>

<p><strong>Caso semplificato:</strong> quando uno dei due tra sistema e ambiente è una <strong>sorgente</strong> (capacità termica infinita, temperatura costante), il calcolo si semplifica drasticamente: $\\Delta S = Q/T$. Quando invece la temperatura cambia, occorre integrare $dQ = mc \\, dT$ ottenendo termini logaritmici.</p>`

<p>Identifichiamo:</p>
<ul>
<li><strong>Sistema:</strong> la sorgente a temperatura $T_2$, che cede calore $Q$.</li>

<p>$$\\Delta S_{\\text{amb}} = m_2 c_2 \\int_{T_2}^{T_E} \\frac{dT}{T} = m_2 c_2 \\, \\ln \\frac{T_E}{T_2} \\lt 0$$</p>

<p>Anche in questo caso il risultato è positivo: il mescolamento termico è un processo irreversibile, e l'entropia dell'universo aumenta.</p>
<p>Si può dimostrare che questa espressione è sempre positiva usando la disuguaglianza $\\ln x \\leq x - 1$, oppure verificarlo numericamente con un esempio concreto.</p>`

                { label: "ΔS_U (mescolamento)", latex: "\\Delta S_U = m_1 c_1 \\ln \\frac{T_E}{T_1} + m_2 c_2 \\ln \\frac{T_E}{T_2}" }
