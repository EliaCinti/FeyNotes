<p>Pensiamo a un pendolo ideale senza attriti: l'energia si trasforma continuamente da potenziale a cinetica e viceversa, ma la somma resta costante e il moto prosegue indefinitamente.</p>
<p>Le forze non conservative (come l'attrito) <strong>dissipano</strong> energia meccanica, trasformandola in calore. Un oggetto lanciato su una superficie scabra si ferma perché l'attrito compie un lavoro negativo che ne azzera l'energia cinetica.</p>`
