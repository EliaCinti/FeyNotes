                    content: `<p>In cinematica, lo stato di moto di un punto materiale è descritto dalla velocità istantanea $\\vec{v}$. In dinamica, invece, vogliamo mettere in relazione lo stato di moto con le cause che lo possono far variare (le forze) e con l'inerzia del corpo. La grandezza che descrive lo <strong>stato dinamico</strong> di un punto è quindi la quantità di moto $\\vec{p} = m\\vec{v}$.</p>

<p>Un urto non richiede contatto fisico. Due cariche elettriche che si avvicinano e deviano per repulsione coulombiana realizzano un urto, pur senza toccarsi. In meccanica macroscopica, comunque, gli urti vengono modellizzati come collisioni con contatto.</p>
<p>Durante un urto le forze interne sono impulsive, cioè agiscono per un tempo $\\tau$ molto breve con intensità tale da produrre variazioni significative della quantità di moto, secondo il teorema dell'impulso:</p>

  <p><strong>📊 Diagramma 1 — Classificazione degli urti nel sistema del CM</strong></p>
  <p><em>Tre colonne (elastico, anelastico, completamente anelastico) con due righe (prima/dopo). In ogni caso: due masse con frecce proporzionali alle velocità nel sistema del CM. Elastico: le frecce dopo hanno stessa lunghezza totale di prima. Anelastico: frecce dopo più corte. Completamente anelastico: dopo l'urto un unico blocco fermo nel CM.</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>
</div>
<p><strong>Visualizzazione dal centro di massa.</strong> Mettendosi nel sistema del centro di massa si vede una scena molto semplice:</p>
<ul>
<li><strong>Urto elastico:</strong> prima dell'urto le due masse si avvicinano, dopo si allontanano con la stessa energia cinetica complessiva.</li>
<li><strong>Urto anelastico:</strong> si avvicinano e poi si allontanano, ma l'energia cinetica relativa è diminuita.</li>
<li><strong>Urto completamente anelastico:</strong> si avvicinano, si fondono e restano ferme rispetto al centro di massa.</li>
</ul>
<p>In tutti i casi il centro di massa prosegue il suo moto rettilineo uniforme con velocità $\\vec{v}_{CM}$. Un'<strong>esplosione</strong> è in qualche modo il fenomeno inverso di un urto completamente anelastico: prima dell'esplosione $E_k' = 0$ (se i frammenti erano uniti), dopo $E_k' \\gt 0$, grazie al lavoro di forze interne (chimiche).</p>`,

                { label: "Urto elastico", latex: "\\Delta E_k = 0" },
                { label: "Urto completamente anelastico", latex: "\\Delta E_k = -E_{k,\\text{in}}'" },

<p>da cui:</p>
<p>$$\\vec{v}_f = \\frac{m_1 \\vec{v}_1 + m_2 \\vec{v}_2}{m_1 + m_2} = \\vec{v}_{CM}$$</p>
<p>Il risultato non sorprende: se $\\vec{P}$ si conserva, allora $\\vec{v}_{CM}$ è costante, e dopo l'urto i corpi uniti si muovono solidalmente al centro di massa.</p>`

<p>Dopo l'urto, essendo $\\vec{v}_f = \\vec{v}_{CM}$:</p>
<p>$$E_{k,\\text{fin}} = \\tfrac{1}{2}(m_1 + m_2) v_{CM}^2$$</p>
<p>La variazione è:</p>
<p>$$\\Delta E_k = E_{k,\\text{fin}} - E_{k,\\text{in}} = -E_{k,\\text{in}}' \\lt 0$$</p>

<p>$$m_1 v_1 = (m_1 + m_2) v_f \\quad \\Rightarrow \\quad v_f = \\frac{m_1}{m_1 + m_2} v_1$$</p>
<p>Calcoliamo la variazione di energia cinetica:</p>
<p>$$\\Delta E_k = \\tfrac{1}{2}(m_1+m_2) v_f^2 - \\tfrac{1}{2} m_1 v_1^2$$</p>
<p>$$= \\tfrac{1}{2}(m_1+m_2)\\frac{m_1^2 v_1^2}{(m_1+m_2)^2} - \\tfrac{1}{2} m_1 v_1^2$$</p>
<p>$$= \\tfrac{1}{2} m_1 v_1^2 \\left[\\frac{m_1}{m_1+m_2} - 1\\right]$$</p>
<p>$$= -\\frac{m_1 m_2}{2(m_1+m_2)} v_1^2$$</p>
<p>Il segno negativo conferma la dissipazione di energia cinetica.</p>
<p><strong>Caso particolare $m_1 = m_2 = m$.</strong> Si ha $v_f = v_1/2$: la massa raddoppia e la velocità si dimezza. L'energia dissipata vale:</p>
<p>$$|\\Delta E_k| = \\frac{m^2}{2 \\cdot 2m}\\,v_1^2 = \\tfrac{1}{4} m v_1^2 = \\tfrac{1}{2} E_{k,\\text{in}}$$</p>
<p>cioè <strong>metà dell'energia cinetica iniziale viene persa</strong>.</p>`

            title: "Urti elastici",
            icon: "🔄",
            content: `<p>In un urto elastico, in assenza di forze esterne impulsive, valgono <strong>due</strong> leggi di conservazione: quella dell'energia cinetica (definizione di urto elastico) e quella della quantità di moto (assenza di forze esterne impulsive).</p>
<p>Indichiamo con $\\vec{v}_1, \\vec{v}_2$ le velocità <em>prima</em> dell'urto e con $\\vec{V}_1, \\vec{V}_2$ quelle <em>dopo</em> l'urto. Le due leggi si scrivono:</p>
<p>$$m_1 \\vec{v}_1 + m_2 \\vec{v}_2 = m_1 \\vec{V}_1 + m_2 \\vec{V}_2$$</p>
<p>$$\\tfrac{1}{2} m_1 v_1^2 + \\tfrac{1}{2} m_2 v_2^2 = \\tfrac{1}{2} m_1 V_1^2 + \\tfrac{1}{2} m_2 V_2^2$$</p>`,

<p><strong>Urto elastico:</strong> due incognite ($\\vec{V}_1, \\vec{V}_2$), servono due equazioni. Per fortuna entrambe le conservazioni sono valide.</p>`

  <p><strong>📊 Diagramma 2 — Urto elastico centrale: prima e dopo</strong></p>
  <p><em>Riga superiore (PRIMA): due rettangoli etichettati $m_1$ e $m_2$ su una retta orizzontale, con frecce $v_1$ (verso destra) e $v_2$ (verso sinistra o nulla). Riga inferiore (DOPO): stessi rettangoli con frecce $V_1$ e $V_2$ nelle nuove direzioni. Indicare chiaramente l'asse x positivo.</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>

<p>Riscriviamo le due conservazioni raggruppando i termini relativi a ciascuna massa:</p>
<p>$$m_1(v_1 - V_1) = -m_2(v_2 - V_2) \\quad \\text{(quantita di moto)}$$</p>
<p>$$m_1(v_1^2 - V_1^2) = -m_2(v_2^2 - V_2^2) \\quad \\text{(energia cinetica)}$$</p>
<p>Usando l'identità $a^2 - b^2 = (a-b)(a+b)$, riscriviamo la seconda:</p>
<p>$$m_1(v_1 - V_1)(v_1+V_1) = -m_2(v_2 - V_2)(v_2+V_2)$$</p>
<p>Dividendo per la prima equazione (nel caso non banale in cui le velocità effettivamente cambiano):</p>
<p>$$v_1 + V_1 = v_2 + V_2$$</p>
<p>ovvero:</p>
<p>$$v_1 - v_2 = -(V_1 - V_2)$$</p>
<p>Questa è una relazione di importante significato fisico: <strong>in un urto elastico unidimensionale la velocità relativa di avvicinamento prima dell'urto è uguale, in modulo e opposta in segno, alla velocità relativa di allontanamento dopo l'urto.</strong></p>`

<p>$$\\begin{cases} m_1 v_1 + m_2 v_2 = m_1 V_1 + m_2 V_2 \\\\ v_1 + V_1 = v_2 + V_2 \\end{cases}$$</p>
<p>Dalla seconda equazione ricaviamo $V_2 = v_1 + V_1 - v_2$. Sostituendo nella prima:</p>
<p>$$m_1 v_1 + m_2 v_2 = m_1 V_1 + m_2(v_1 + V_1 - v_2)$$</p>
<p>$$m_1 v_1 + m_2 v_2 = (m_1 + m_2) V_1 + m_2 v_1 - m_2 v_2$$</p>
<p>$$(m_1 - m_2) v_1 + 2m_2 v_2 = (m_1 + m_2) V_1$$</p>
<p>Da cui:</p>
<p>$$V_1 = \\frac{m_1 - m_2}{m_1 + m_2}\\,v_1 + \\frac{2 m_2}{m_1 + m_2}\\,v_2$$</p>
<p>Analogamente, sostituendo nella seconda equazione si ottiene:</p>
<p>$$V_2 = \\frac{2 m_1}{m_1 + m_2}\\,v_1 + \\frac{m_2 - m_1}{m_1 + m_2}\\,v_2$$</p>
<p><strong>Strategia pratica:</strong> queste formule sono di laboriosa memorizzazione. È più efficace, nei singoli problemi, scrivere le due equazioni di conservazione e applicarle alle condizioni specifiche (una massa ferma, masse uguali, ecc.), che semplificano drasticamente il sistema.</p>`

<p>$$V_1 = \\frac{m - m}{m + m}\\,v_1 + \\frac{2m}{m+m}\\cdot 0 = 0$$</p>
<p>$$V_2 = \\frac{2m}{m + m}\\,v_1 + \\frac{m - m}{m+m}\\cdot 0 = v_1$$</p>
<p>Dopo l'urto, la massa $m_1$ si <strong>ferma</strong> e la massa $m_2$ riparte con la stessa velocità $v_1$ che aveva $m_1$: è come se le due masse si scambiassero la velocità, <strong>trasferendo integralmente quantità di moto ed energia cinetica</strong>.</p>`

<p>Se si solleva la prima sfera e la si lascia cadere, essa arriva con una certa velocità $v_1$ a urtare la seconda. Per l'urto elastico tra masse uguali, la prima si ferma e trasferisce tutta la velocità alla seconda. La seconda urta la terza e si ferma, e così via in catena fino all'ultima sfera: non avendo nessuno a cui ritrasferire l'energia, essa si stacca e sale fino a una quota uguale a quella di partenza.</p>
<p>Le sfere intermedie restano praticamente immobili: trasmettono l'energia tramite onde elastiche compressive microscopiche, senza accumularla. Sollevando due sfere ne partono due dall'altro lato, con tre ne partono tre.</p>
<p><strong>Verifica per $N=3$ sfere uguali (massa $m$).</strong> La sfera 1 arriva con velocità $v_1$:</p>
<ul>
<li><strong>Urto 1→2:</strong> per le formule con masse uguali, dopo l'urto $V_1 = 0$ e la sfera 2 parte con $v_1$.</li>
<li><strong>Urto 2→3:</strong> la sfera 2 (con velocità $v_1$) urta la sfera 3 ferma. Di nuovo: $V_2 = 0$ e la sfera 3 parte con $v_1$.</li>
</ul>
<p>Risultato: le sfere 1 e 2 sono ferme, la sfera 3 parte con velocità $v_1$. Il trasferimento è totale e sequenziale.</p>
<p>In pratica il moto si smorza per piccole dissipazioni (deformazioni microscopiche, attriti dell'aria, riscaldamento), ma in un'idealizzazione perfetta il moto continuerebbe indefinitamente.</p>`
