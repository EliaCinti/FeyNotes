<p><strong>Il sudore come meccanismo di raffreddamento:</strong> il corpo produce sudore sulla pelle. Per evaporare, il sudore deve compiere la transizione liquido $\\to$ gas, cioè assorbire energia: la sottrae alla superficie cutanea, raffreddandola. In un ambiente caldo e secco l'evaporazione è efficiente; in un ambiente molto umido l'aria è già satura di vapore, l'evaporazione è inibita e il sudore resta liquido. Per questo si tollerano meglio $40°\\mathrm{C}$ in clima secco che $30°\\mathrm{C}$ in clima molto umido.</p>
<p><strong>La cottura della pasta:</strong> quando l'acqua bolle, il sistema acqua liquida–vapore è bifasico e la temperatura resta sostanzialmente costante (al valore di ebollizione alla pressione data). Anche se parte dell'acqua evapora e il livello in pentola si abbassa, la temperatura non cambia: ecco perché i tempi di cottura sono ripetibili e affidabili.</p>`

<p>$$\\Delta U = Q - W$$</p>

<p>Geometricamente, l'integrale è l'<strong>area sottesa dalla curva</strong> $P(V)$ nel piano $(V,P)$ tra il volume iniziale e quello finale. Tale area dipende dal <em>percorso</em>: trasformazioni diverse che collegano gli stessi stati hanno aree sottese diverse, quindi $W$ <em>non</em> è una funzione di stato. Lo stesso vale per $Q$.</p>
