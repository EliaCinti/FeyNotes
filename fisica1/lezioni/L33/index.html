            content: `<p>Prima di classificare gli urti, richiamiamo un risultato fondamentale che sarà il pilastro concettuale dell'intera trattazione.</p>
<p>Il <strong>Teorema di König</strong> afferma che l'energia cinetica totale di un sistema di particelle si può decomporre nella somma di due contributi:</p>
<p>$$E_k = E_k' + E_{k,CM}$$</p>
<p>dove:</p>

<li>$E_{k,CM} = \\frac{1}{2}M_{tot}\\, v_{CM}^2$ è l'<strong>energia cinetica del centro di massa</strong>, trattato come un punto materiale con tutta la massa del sistema;</li>

<p>Questa decomposizione è cruciale: quando la quantità di moto totale si conserva ($\\vec{p} = \\text{costante}$), la velocità del centro di massa $v_{CM}$ non cambia, e quindi $E_{k,CM}$ rimane invariata. L'unica quota di energia cinetica che può variare durante un urto è quella interna $E_k'$, legata ai moti relativi tra i corpi.</p>`,

            content: `<p><strong>Definizione:</strong> Un urto si definisce <strong>elastico</strong> se durante l'interazione l'energia cinetica totale del sistema si conserva:</p>

                    content: `<p>Se oltre all'energia cinetica si conserva anche la quantità di moto totale del sistema ($\\vec{p} = \\text{costante}$), allora anche l'energia cinetica del centro di massa si conserva ($\\Delta E_{k,CM} = 0$).</p>
<p>Dal Teorema di König:</p>
<p>$$E_k = E_k' + E_{k,CM}$$</p>
<p>Se $\\Delta E_k = 0$ e $\\Delta E_{k,CM} = 0$, ne consegue che anche la variazione dell'energia cinetica relativa al centro di massa è nulla:</p>
<p>$$\\Delta E_k' = \\Delta E_k - \\Delta E_{k,CM} = 0 - 0 = 0$$</p>
<p>Questo significa che, nel sistema di riferimento del centro di massa, l'energia cinetica dei corpi prima e dopo l'urto rimane la stessa. Ad esempio, due sferette che si avvicinano e poi si riallontanano dopo l'urto, lo fanno con la stessa energia cinetica totale nel sistema del centro di massa.</p>`

            icon: "🔴",
            content: `<p><strong>Definizione:</strong> Un urto si definisce <strong>completamente anelastico</strong> se, dopo la collisione, i corpi rimangono attaccati e si muovono insieme come un unico corpo.</p>
<p>In questo caso, dopo l'urto non ci sono più moti relativi rispetto al centro di massa. L'energia cinetica finale relativa al centro di massa è quindi nulla: $E'_{k, \\text{finale}} = 0$.</p>
<p>La variazione di energia cinetica relativa al centro di massa è:</p>
<p>$$\\Delta E'_k = E'_{k, \\text{finale}} - E'_{k, \\text{iniziale}} = 0 - E'_{k, \\text{iniziale}} = -E'_{k, \\text{iniziale}}$$</p>

<p>Se la quantità di moto si conserva, $\\Delta E_{k,CM} = 0$, e la variazione totale di energia cinetica del sistema è:</p>
<p>$$\\Delta E_k = \\Delta E'_k = -E'_{k, \\text{iniziale}}$$</p>
<p>Questa rappresenta la <strong>massima perdita di energia cinetica possibile</strong> in un urto.</p>`,

<p>Gli urti che consideriamo in meccanica sono generalmente <strong>dissipativi</strong>, ovvero comportano una perdita di energia cinetica ($\\Delta E_k \\lt 0$). Processi come le esplosioni, invece, possono fornire energia al sistema ($\\Delta E_k \\gt 0$).</p>
<p>Per quantificare il grado di elasticità di un urto, si introduce una grandezza adimensionale.</p>`,

                    content: `<p>Il <strong>coefficiente di restituzione</strong>, indicato con $e$, quantifica il grado di elasticità di un urto. La sua versione al quadrato, $e^2$, mette in relazione l'energia cinetica relativa al centro di massa finale e iniziale:</p>
<p>$$E'_{k, \\text{finale}} = e^2 \\, E'_{k, \\text{iniziale}}$$</p>
<p>dove $0 \\le e \\le 1$.</p>
<p>A seconda del valore di $e$, possiamo classificare l'urto:</p>

<li>Se $e=0$ ($e^2=0$): $E'_{k, \\text{finale}} = 0$. L'urto è <strong>completamente anelastico</strong>.</li>
<li>Se $0 \\lt e \\lt 1$ ($0 \\lt e^2 \\lt 1$): l'urto è <strong>anelastico</strong> (o parzialmente elastico).</li>
</ul>`

            type: "section",
            title: "Relazione tra Velocità Relative",
            icon: "🔄",
            content: `<p>Dal coefficiente di restituzione si può derivare una relazione fondamentale tra le velocità relative dei corpi prima e dopo l'urto (in una dimensione).</p>`,
            subsections: [
                {
                    subtitle: "Energia cinetica e massa ridotta",
                    content: `<p>Nel sistema del centro di massa, l'energia cinetica relativa si esprime in termini della <strong>massa ridotta</strong> $\\mu = \\frac{m_1 m_2}{m_1 + m_2}$ e della <strong>velocità relativa</strong> $v_{\\text{rel}} = v_1 - v_2$:</p>
<p>$$E'_k = \\frac{1}{2}\\,\\mu\\, v_{\\text{rel}}^2$$</p>
<p><strong>Da dove viene questa formula?</strong> Nel sistema del CM, le velocità delle due particelle sono $v_1' = v_1 - v_{CM}$ e $v_2' = v_2 - v_{CM}$. L'energia cinetica nel sistema del CM è:</p>
<p>$$E_k' = \\frac{1}{2}m_1 v_1'^2 + \\frac{1}{2}m_2 v_2'^2$$</p>
<p>Sostituendo $v_{CM} = \\frac{m_1 v_1 + m_2 v_2}{m_1+m_2}$ e raccogliendo, si verifica (dopo un po' di algebra) che questa espressione si riduce esattamente a $\\frac{1}{2}\\mu\\,(v_1-v_2)^2$, dove $\\mu = \\frac{m_1 m_2}{m_1+m_2}$ è la massa ridotta del sistema.</p>`
                },
                {
                    subtitle: "Derivazione della relazione",
                    content: `<p>Applichiamo la definizione del coefficiente di restituzione:</p>
<p>$$E'_{k,\\text{finale}} = e^2\\, E'_{k,\\text{iniziale}} \\quad \\Rightarrow \\quad \\frac{1}{2}\\,\\mu\\,(V_1 - V_2)^2 = e^2 \\cdot \\frac{1}{2}\\,\\mu\\,(v_1 - v_2)^2$$</p>
<p>Semplificando $\\frac{1}{2}\\mu$ da entrambi i lati e prendendo la radice quadrata:</p>
<p>$$|V_1 - V_2| = e\\,|v_1 - v_2|$$</p>
<p>Ora occorre determinare il <strong>segno</strong>. Prima dell'urto i corpi si avvicinano: se il corpo 1 insegue il corpo 2, allora $v_1 \\gt v_2$ e quindi $(v_1 - v_2) \\gt 0$. Dopo l'urto i corpi si allontanano: il corpo 1 è più lento del corpo 2 (o va all'indietro), quindi $V_1 \\lt V_2$ e $(V_1 - V_2) \\lt 0$. La velocità relativa cambia segno, e pertanto il segno meno è necessario:</p>
<p>$$V_1 - V_2 = -e\\,(v_1 - v_2)$$</p>
<p>dove $v_1, v_2$ sono le velocità prima dell'urto e $V_1, V_2$ sono le velocità dopo l'urto.</p>`

<p>$$V_1 - V_2 = -(v_1 - v_2)$$</p>
<p>La velocità relativa di allontanamento è l'opposto della velocità relativa di avvicinamento. In altre parole, i corpi "rimbalzano" con la stessa velocità relativa.</p>`

            icon: "⚠️",
            content: `<p>La formula $V_1 - V_2 = -e(v_1 - v_2)$ ha un <strong>segno meno</strong> che non è arbitrario: deriva dal fatto che la velocità relativa cambia verso tra prima e dopo l'urto.</p>
<ul>

<li><strong>Dopo l'urto:</strong> $V_1 \\lt V_2$ (i corpi si allontanano) → $(V_1 - V_2) \\lt 0$</li>
</ul>
<p>Un errore frequente all'esame è dimenticare il segno meno o confondere il modulo con la formula vettoriale. La formula con i moduli è $|V_1 - V_2| = e|v_1 - v_2|$, ma quella con il segno è più potente perché tiene conto della direzione.</p>`

<p>Consideriamo il pavimento come un corpo di massa infinita, la cui velocità è sempre nulla ($v_2 = V_2 = 0$). In questo caso la relazione sulle velocità relative si riduce a: $V_1 = -e\\,v_1$.</p>`,

<p>$$mgH = \\frac{1}{2}mv_1^2 \\quad \\Rightarrow \\quad |v_1| = \\sqrt{2gH}$$</p>
<p>Scegliendo un asse $y$ verticale verso l'alto, la velocità di impatto è $v_1 = -\\sqrt{2gH}$ (diretta verso il basso).</p>`

<p>La velocità subito dopo il rimbalzo è $V_1 = +\\sqrt{2gh}$ (diretta verso l'alto).</p>`

<p>Da cui:</p>
<p>$$e = \\frac{\\sqrt{2gh}}{\\sqrt{2gH}} = \\sqrt{\\frac{h}{H}}$$</p>

<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
  <p><strong>📊 Diagramma 1 — Le tre fasi del pendolo balistico</strong></p>
  <p><em>Stato iniziale: proiettile di massa m con velocità v verso il blocco M appeso al pendolo. Subito dopo l'urto: sistema (m+M) in moto orizzontale con velocità V_f. Altezza massima: il pendolo ha oscillato fino all'altezza h, con il sistema fermo. L'altezza h è misurata tra il centro di massa del sistema nella posizione di equilibrio e nella posizione di massima oscillazione.</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>

<li><strong>L'urto:</strong> è un processo molto rapido in cui il proiettile si conficca nel blocco. Durante questo brevissimo intervallo di tempo, le forze esterne (tensione del filo, gravità) non sono impulsive. Possiamo quindi considerare la <strong>quantità di moto del sistema come conservata</strong> lungo la direzione orizzontale. L'energia meccanica, invece, <strong>non si conserva</strong> poiché l'urto è completamente anelastico.</li>
<li><strong>L'oscillazione:</strong> dopo l'urto, il sistema (blocco + proiettile) oscilla verso l'alto. Le forze agenti sono la gravità (conservativa) e la tensione del filo (che non compie lavoro). Pertanto, l'<strong>energia meccanica del sistema si conserva</strong>. La quantità di moto, invece, non si conserva a causa della forza esterna del vincolo.</li>
</ol>`

<p>$$mv = (m+M)V_f$$</p>`
                },

<p>$$\\frac{1}{2}(m+M)V_f^2 = (m+M)gh$$</p>
<p>Da cui:</p>
<p>$$V_f = \\sqrt{2gh}$$</p>`
                },

<p>$$mv = (m+M)\\sqrt{2gh}$$</p>
<p>Risolvendo per la velocità iniziale del proiettile:</p>
<p>$$v = \\frac{m+M}{m}\\sqrt{2gh}$$</p>
<p>Misurando le masse $m$, $M$ e l'altezza $h$, è possibile determinare la velocità del proiettile. Il pendolo balistico è storicamente uno dei primi strumenti per la misura della velocità dei proiettili.</p>`
