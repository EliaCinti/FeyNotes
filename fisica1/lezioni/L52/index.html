                    content: `<p>Consideriamo un ciclo termodinamico qualsiasi (non necessariamente reversibile). La disuguaglianza di Clausius afferma che:</p>
<p>$$\\oint \\frac{\\delta Q}{T} \\leq 0$$</p>
<p>dove $\\delta Q$ è la quantità infinitesima di calore scambiata dal sistema con una sorgente a temperatura $T$. L'uguaglianza vale se e solo se il ciclo è <strong>completamente reversibile</strong>.</p>
<p><strong>Verifica per il ciclo di Carnot:</strong> poiché nelle trasformazioni adiabatiche $\\delta Q = 0$, i soli contributi all'integrale provengono dalle due isoterme:</p>
<p>$$\\oint \\frac{\\delta Q}{T} = \\frac{Q_A}{T_2} + \\frac{Q_C}{T_1}$$</p>
<p>Ricordando che $Q_A = nRT_2 \\ln(V_B/V_A)$ e $Q_C = nRT_1 \\ln(V_D/V_C)$, e usando la relazione $V_B/V_A = V_C/V_D$:</p>

<p>Ricordiamo che una quantità è un differenziale esatto se il suo integrale dipende solo dagli estremi e non dal percorso, ovvero se è la variazione di una funzione di stato.</p>
<p><strong>Definizione:</strong> Si definisce <strong>entropia</strong> ($S$) quella funzione di stato la cui variazione infinitesima è data da:</p>
<p>$$dS = \\frac{\\delta Q_{rev}}{T}$$</p>
<p>La variazione di entropia tra due stati A e B è quindi:</p>
<p>$$\\Delta S = S_B - S_A = \\int_A^B \\frac{\\delta Q_{rev}}{T}$$</p>
<p><strong>Punto chiave:</strong> L'entropia è una funzione di stato, quindi $\\Delta S$ dipende solo dagli stati iniziale e finale, non dal percorso. Tuttavia, per calcolarla, dobbiamo usare l'integrale di $\\frac{\\delta Q}{T}$ lungo un <strong>qualsiasi percorso reversibile</strong> che connetta A e B. Se la trasformazione reale è irreversibile, per calcolare $\\Delta S$ dobbiamo immaginare una trasformazione reversibile tra gli stessi stati.</p>
<p>Dalla disuguaglianza di Clausius, si può dimostrare che per una trasformazione qualsiasi:</p>
<ul>
<li><strong>Reversibile:</strong> $\\Delta S = \\int_A^B \\frac{\\delta Q}{T}$</li>
<li><strong>Irreversibile:</strong> $\\Delta S \\gt \\int_A^B \\frac{\\delta Q}{T}$</li>
