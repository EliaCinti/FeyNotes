<p>$$d\\vec{s} = dr\\,\\hat{u}_r + r\\,d\\theta\\,\\hat{u}_\\theta$$</p>

<p>poiché $\\hat{u}_r \\cdot \\hat{u}_r = 1$ e $\\hat{u}_r \\cdot \\hat{u}_\\theta = 0$. L'integrale diventa:</p>
<p>$$W_{A \\to B} = \\int_{r_A}^{r_B} F(r)\\,dr$$</p>
<p>Poiché l'integrale dipende <strong>solo dagli estremi</strong> $r_A$ e $r_B$ (le distanze dal centro) e <strong>non dal cammino</strong>, la forza è conservativa. ∎</p>`

<p>$$G\\frac{M_T\\,m_g}{R_T^2} = m_i\\,a \\quad \\Rightarrow \\quad a = \\frac{m_g}{m_i}\\cdot\\frac{G\\,M_T}{R_T^2}$$</p>
<p>Se il rapporto $m_g/m_i$ dipendesse dalla composizione del corpo, una palla di piombo e una di legno cadrebbero con accelerazioni diverse. L'esperimento mostra che ciò <strong>non accade</strong>: tutti i corpi cadono con la stessa accelerazione, il che implica $m_g = m_i$.</p>
<p>Definiamo ora il vettore <strong>accelerazione di gravità</strong> raggruppando i termini costanti:</p>
<p>$$\\vec{g} = -G\\frac{M_T}{R_T^2}\\hat{u}_r$$</p>
<p>Il suo modulo vale:</p>
<p>$$|\\vec{g}| = G\\frac{M_T}{R_T^2} = \\frac{6{,}67 \\times 5{,}97}{(6{,}37)^2} \\times 10^{-11+24-12} \\approx \\frac{39{,}8}{40{,}6} \\times 10 \\approx 9{,}81\\,\\text{m/s}^2$$</p>
<p>La forza peso si scrive nella forma compatta:</p>
<p>$$\\vec{P} = m\\vec{g}$$</p>`
                }
            ],
            formulas: [
                { label: "Accelerazione di gravità", latex: "\\vec{g} = -G\\frac{M_T}{R_T^2}\\hat{u}_r" },
                { label: "Forza peso", latex: "\\vec{P} = m\\vec{g}" }
