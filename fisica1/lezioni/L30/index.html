<p>$$\\sum_{i} \\vec{r}'_i \\times m_i \\vec{v}'_i = \\vec{L}_{CM}$$</p>
<p><strong>Termine (2):</strong> $\\sum_{i} \\vec{r}'_i \\times m_i \\vec{v}_{CM}$</p>

<p>$$\\left( \\sum_{i} m_i \\vec{r}'_i \\right) \\times \\vec{v}_{CM}$$</p>
<p>L'espressione in parentesi è il momento statico rispetto al centro di massa, che è <strong>identicamente nullo</strong>. Quindi il termine (2) è zero.</p>

<p>Portiamo fuori il vettore costante $\\vec{r}_{CM}$:</p>
<p>$$\\vec{r}_{CM} \\times \\left( \\sum_{i} m_i \\vec{v}'_i \\right)$$</p>
<p>L'espressione in parentesi è la quantità di moto totale nel sistema del centro di massa, che è <strong>nulla</strong>. Quindi il termine (3) è zero.</p>

<p>Il momento angolare totale di un sistema di punti materiali rispetto a un polo fisso $O$ ($\\vec{L}_O$) è dato dalla somma del momento angolare del sistema rispetto al suo centro di massa ($\\vec{L}_{CM}$, detto momento angolare proprio o interno) e del momento angolare del centro di massa rispetto al polo $O$ (detto momento angolare orbitale):</p>
<p>$$\\vec{L}_O = \\vec{L}_{CM} + \\vec{r}_{CM} \\times (M \\vec{v}_{CM})$$</p>

            icon: "⚡",
            content: `<p>Passiamo ora a considerare l'energia. Quale relazione esiste tra l'energia cinetica totale del sistema misurata nel sistema fisso, $E_k$, e quella misurata nel sistema del centro di massa, $E'_k$?</p>
<p>L'energia cinetica totale nel sistema fisso è:</p>
<p>$$E_k = \\sum_{i} \\frac{1}{2} m_i v_i^2 = \\sum_{i} \\frac{1}{2} m_i (\\vec{v}_i \\cdot \\vec{v}_i)$$</p>
<p>Sostituiamo la legge di composizione delle velocità $\\vec{v}_i = \\vec{v}'_i + \\vec{v}_{CM}$:</p>
<p>$$E_k = \\sum_{i} \\frac{1}{2} m_i (\\vec{v}'_i + \\vec{v}_{CM}) \\cdot (\\vec{v}'_i + \\vec{v}_{CM})$$</p>

<p>$$E_k = \\underbrace{\\sum_{i} \\frac{1}{2} m_i (\\vec{v}'_i \\cdot \\vec{v}'_i)}_{(1)} + \\underbrace{\\sum_{i} m_i (\\vec{v}'_i \\cdot \\vec{v}_{CM})}_{(2)} + \\underbrace{\\sum_{i} \\frac{1}{2} m_i (\\vec{v}_{CM} \\cdot \\vec{v}_{CM})}_{(3)}$$</p>`,

<p><strong>Termine (2):</strong> $\\sum_{i} m_i (\\vec{v}'_i \\cdot \\vec{v}_{CM})$</p>

<p><strong>Termine (3):</strong> $\\sum_{i} \\frac{1}{2} m_i v_{CM}^2$</p>

<p>$$\\frac{1}{2} v_{CM}^2 \\sum_{i} m_i = \\frac{1}{2} M v_{CM}^2$$</p>

<p>$$E_k = E'_k + \\frac{1}{2} M v_{CM}^2$$</p>
<p>Anche questo teorema permette di <strong>separare</strong> l'energia totale in due contributi:</p>
<ul>
<li>L'energia cinetica <strong>del</strong> centro di massa, associata al moto d'insieme del sistema.</li>
<li>L'energia cinetica <strong>interna</strong>, associata ai moti dei punti materiali <strong>rispetto</strong> al centro di massa.</li>
</ul>
<p>Questa scomposizione è estremamente utile, in particolare nello studio dei fenomeni d'urto.</p>`

                {
                    subtitle: "Conservazione separata dei contributi energetici",
                    content: `<p>Se la quantità di moto totale si conserva, allora $\\vec{p}_{\\text{tot}} = M \\vec{v}_{CM} = \\text{costante}$, e quindi la velocità del centro di massa $\\vec{v}_{CM}$ rimane costante. Di conseguenza, l'energia cinetica del centro di massa</p>
<p>$$\\frac{1}{2} M v_{CM}^2$$</p>
<p>è una <strong>quantità conservata, indipendentemente dal tipo di urto</strong>.</p>
<p>Per il secondo teorema di König, se anche l'energia cinetica totale $E_k$ si conserva (urto elastico), allora per differenza si conserva anche l'energia cinetica interna:</p>
<p>$$E'_k = E_k - \\frac{1}{2} M v_{CM}^2 = \\text{costante}$$</p>
<p>Viceversa, in un urto anelastico, poiché $\\frac{1}{2} M v_{CM}^2$ è comunque costante, <strong>tutta la variazione di energia cinetica è a carico dell'energia cinetica interna</strong> $E'_k$. L'energia dissipata è dunque:</p>
<p>$$\\Delta E = E'_{k, \\text{iniziale}} - E'_{k, \\text{finale}}$$</p>
<p>Poiché in un urto anelastico l'energia cinetica interna diminuisce ($E'_{k, \\text{finale}} \\lt E'_{k, \\text{iniziale}}$), si ha $\\Delta E \\gt 0$, che rappresenta l'energia dissipata (convertita in calore, deformazione, ecc.).</p>`

<li><strong>Urto anelastico:</strong> l'energia cinetica totale del sistema <strong>non</strong> si conserva (generalmente diminuisce). L'energia cinetica del centro di massa resta costante, quindi è l'energia cinetica interna $E'_k$ che viene <strong>parzialmente dissipata</strong> in altre forme di energia (calore, deformazione permanente, ecc.).</li>
<li><strong>Urto completamente anelastico:</strong> è il caso limite di <strong>massima dissipazione</strong> di energia. Dopo l'urto, i corpi rimangono attaccati e si muovono insieme. Questo significa che i moti interni cessano, e l'energia cinetica interna finale è zero ($E'_{k, \\text{finale}} = 0$). Tutta l'energia cinetica interna iniziale è stata dissipata. L'energia cinetica residua del sistema è esclusivamente quella del centro di massa: $E_{k, \\text{finale}} = \\frac{1}{2} M v_{CM}^2$.</li>
</ul>`
