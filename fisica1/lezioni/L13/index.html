            title: "La Tensione come Forza Vincolare",
            icon: "🪢",
            content: `<p>In questa lezione continuiamo l'analisi delle forze particolari, riprendendo il discorso sulla <strong>tensione</strong>. La tensione è una forza di reazione vincolare prodotta da una fune tesa. Il modello di fune che considereremo, a meno che non sia specificato diversamente, è quello di una <strong>fune ideale</strong>.</p>
<p><strong>Definizione — Fune Ideale:</strong> Una fune ideale è un modello fisico che possiede le seguenti proprietà:</p>
<ul>
<li>È <strong>priva di massa</strong> ($m_{\\text{fune}} = 0$).</li>
<li>È <strong>inestensibile</strong>, ovvero la sua lunghezza non varia quando viene sottoposta a trazione.</li>
<li>Esercita una forza (tensione) <strong>solo se è tesa</strong>. Se la fune non è tesa, non esercita alcuna forza.</li>
</ul>
<p>La fune rappresenta un <strong>vincolo di contatto</strong>, ma a differenza di un piano d'appoggio, il contatto è puntuale, avvenendo solo all'estremità della fune a cui è collegato un corpo. Il vincolo cessa di esistere nel momento in cui la fune non è più tesa.</p>
<p>Come tutti i vincoli, la presenza di una fune altera il moto libero di un corpo. Ricordiamo che un vincolo è un sistema che, interagendo con un corpo, ne altera il moto libero generando una forza di reazione vincolare. Abbiamo già visto diversi esempi:</p>
<ul>
<li>Un tavolo che impedisce la caduta di un oggetto esercita una <strong>reazione normale</strong>.</li>
<li>L'interazione tra superfici a contatto può generare una forza di <strong>attrito statico o dinamico</strong>.</li>
<li>Un paracadute che interagisce con l'aria genera una forza di <strong>resistenza viscosa</strong>.</li>
<li>Una molla collegata a un corpo esercita una <strong>forza elastica</strong>.</li>
</ul>
<p>La fune tesa rientra in questa categoria, generando una forza che chiamiamo <strong>tensione</strong>.</p>`,
            subsections: [
                {
                    subtitle: "Proprietà della Tensione",
                    content: `<p>Consideriamo un segmento di una fune ideale tesa, delimitato da due punti A e B. Supponiamo che agli estremi di questo segmento siano applicate due forze esterne $\\vec{F}_A$ e $\\vec{F}_B$.</p>
<p><strong>Proposizione:</strong> In una fune ideale (priva di massa, inestensibile e tesa), la tensione ha la <strong>stessa magnitudine in ogni suo punto</strong>. La sua direzione è sempre <strong>tangente alla fune</strong> stessa, orientata in modo da "tirare" il corpo a cui è collegata.</p>
<p><strong>Dimostrazione:</strong> Applichiamo la seconda legge di Newton al segmento di fune compreso tra A e B:</p>
<p>$$\\vec{F}_A + \\vec{F}_B = m_{\\text{fune}} \\vec{a}$$</p>
<p>Poiché la fune è ideale, la sua massa $m_{\\text{fune}}$ è nulla. Di conseguenza, il prodotto $m_{\\text{fune}} \\vec{a}$ è nullo, <strong>indipendentemente dall'accelerazione del sistema</strong>:</p>
<p>$$\\vec{F}_A + \\vec{F}_B = 0 \\quad \\Rightarrow \\quad \\vec{F}_A = -\\vec{F}_B$$</p>
<p>Questo ci dice che le forze applicate agli estremi di un qualsiasi segmento di una fune ideale devono essere <strong>uguali e opposte</strong>.</p>
<p>Ora analizziamo le forze agenti sugli elementini infinitesimali di fune nei punti A e B. Nel punto B, l'elementino di fune è soggetto alla forza esterna $\\vec{F}_B$ e alla forza interna $\\vec{T}_B$ (la tensione) esercitata dal resto della fune. Analogamente, in A agiscono $\\vec{F}_A$ e la tensione $\\vec{T}_A$.</p>
<p>Considerando l'equilibrio di questi elementini di massa nulla:</p>
<p>$$\\text{In A:} \\quad \\vec{F}_A + \\vec{T}_A = 0$$</p>
<p>$$\\text{In B:} \\quad \\vec{F}_B + \\vec{T}_B = 0$$</p>
<p>Da queste relazioni otteniamo $\\vec{T}_A = -\\vec{F}_A$ e $\\vec{T}_B = -\\vec{F}_B$. Poiché abbiamo dimostrato che $\\vec{F}_A = -\\vec{F}_B$, segue che:</p>
<p>$$\\vec{T}_A = -(-\\vec{F}_B) = \\vec{F}_B = -\\vec{T}_B$$</p>
<p>Questo significa che i vettori tensione ai due estremi sono opposti, $\\vec{T}_A = -\\vec{T}_B$, e quindi hanno la <strong>stessa magnitudine</strong>:</p>
<p>$$| \\vec{T}_A | = | \\vec{T}_B |$$</p>
<p>Poiché A e B sono due punti arbitrari della fune, concludiamo che la magnitudine della tensione, che indicheremo semplicemente con $T$, è <strong>costante lungo tutta la fune</strong>.</p>
<p>La fune ideale è dunque un dispositivo che <strong>trasferisce una forza da un estremo all'altro</strong>, mantenendone inalterata la magnitudine. Questo è utilissimo, ad esempio, per cambiare la direzione di una forza applicata, come vedremo con le carrucole.</p>`
                }
            ],

                { label: "Tensione costante", latex: "| \\vec{T}_A | = | \\vec{T}_B | = T" }
            ]

            content: `<p>Vediamo ora alcuni esempi classici che coinvolgono la tensione. Questi esercizi sono fondamentali per l'esame e illustrano il metodo sistematico per risolvere problemi con funi ideali.</p>`,

                    subtitle: "Due masse collegate su un piano orizzontale",
                    content: `<p>Consideriamo due masse, $m_1$ e $m_2$, appoggiate su un piano orizzontale <strong>privo di attrito</strong>. Le masse sono collegate da una fune ideale. Una forza orizzontale $\\vec{F}$ viene applicata alla massa $m_1$. Vogliamo determinare l'accelerazione del sistema e la tensione della fune.</p>
<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
  <p><strong>📊 Diagramma 1 — Due masse collegate su piano orizzontale</strong></p>
  <p><em>Due blocchi $m_2$ (a sinistra) e $m_1$ (a destra) collegati da una fune orizzontale. Forza $\\vec{F}$ applicata a $m_1$ verso destra. Tensione $\\vec{T}$ che tira $m_1$ verso sinistra e $m_2$ verso destra.</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>
</div>
<p>Poiché la fune è inestensibile, le due masse si muoveranno insieme con la <strong>stessa accelerazione</strong> $\\vec{a}$. Scegliamo un asse x orientato come la forza $\\vec{F}$.</p>
<p><strong>Massa $m_1$:</strong> Sulla massa $m_1$ agiscono la forza esterna $\\vec{F}$ e la tensione $\\vec{T}$ che tira verso sinistra:</p>
<p>$$F - T = m_1 a$$</p>
<p><strong>Massa $m_2$:</strong> Sulla massa $m_2$ agisce solo la tensione $\\vec{T}$ che tira verso destra:</p>
<p>$$T = m_2 a$$</p>
<p>Abbiamo un sistema di due equazioni in due incognite ($a$ e $T$). Sostituiamo la seconda nella prima:</p>
<p>$$F - m_2 a = m_1 a \\quad \\Rightarrow \\quad F = (m_1 + m_2) a$$</p>
<p>Da cui ricaviamo l'accelerazione:</p>
<p>$$a = \\frac{F}{m_1 + m_2}$$</p>
<p>E la tensione:</p>
<p>$$T = m_2 a = F \\frac{m_2}{m_1 + m_2}$$</p>
<p><strong>Osservazione importante:</strong> L'accelerazione del sistema è la stessa che si avrebbe se la forza $F$ fosse applicata a un unico corpo di massa totale $M = m_1 + m_2$. Questo è un utile <strong>controllo di coerenza</strong>. Inoltre, la tensione $T$ è sempre <strong>minore</strong> della forza applicata $F$, poiché il fattore $\\frac{m_2}{m_1 + m_2}$ è sempre minore di 1. La forza $F$ deve accelerare entrambe le masse, mentre la tensione $T$ deve accelerare solo $m_2$.</p>`

                {
                    subtitle: "La Macchina di Atwood",
                    content: `<p>La macchina di Atwood è un dispositivo costituito da una <strong>carrucola ideale</strong> (massa e attrito trascurabili) attorno alla quale scorre una fune ideale, ai cui estremi sono appese due masse $m_1$ e $m_2$.</p>
<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
  <p><strong>📊 Diagramma 2 — Macchina di Atwood</strong></p>
  <p><em>Carrucola ideale fissata in alto. Fune ideale che scorre sulla carrucola con massa $m_1$ appesa a sinistra e massa $m_2$ appesa a destra. Asse y verticale orientato verso l'alto.</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>
</div>
<p>Scegliamo un asse y verticale orientato verso l'alto. Poiché la fune è ideale e scorre su una carrucola ideale, la tensione $T$ ha la stessa magnitudine per entrambe le masse.</p>
<p>Il vincolo della fune inestensibile impone che se una massa sale, l'altra deve scendere della stessa quantità. Le accelerazioni sono <strong>uguali in modulo ma opposte in verso</strong>: $\\vec{a}_1 = -\\vec{a}_2$.</p>
<p>Assumiamo che $m_2$ scenda e $m_1$ salga. Se $a$ è il modulo dell'accelerazione: $a_1 = a$ e $a_2 = -a$.</p>
<p><strong>Massa $m_1$:</strong></p>
<p>$$T - m_1 g = m_1 a$$</p>
<p><strong>Massa $m_2$:</strong></p>
<p>$$T - m_2 g = -m_2 a$$</p>
<p>Per risolvere, sottraiamo la seconda equazione dalla prima:</p>
<p>$$(T - m_1 g) - (T - m_2 g) = m_1 a - (-m_2 a)$$</p>
<p>$$-m_1 g + m_2 g = m_1 a + m_2 a$$</p>
<p>$$(m_2 - m_1)g = (m_1 + m_2)a$$</p>
<p>Da cui si ricava l'accelerazione:</p>
<p>$$a = \\frac{m_2 - m_1}{m_1 + m_2} \\, g$$</p>
<p><strong>Discussione del risultato:</strong></p>
<ul>
<li>Se $m_2 \\gt m_1$, allora $a \\gt 0$: $m_2$ scende e $m_1$ sale (coerente con l'ipotesi).</li>
<li>Se $m_1 \\gt m_2$, allora $a \\lt 0$: il moto è opposto, $m_1$ scende e $m_2$ sale.</li>
<li>Se $m_1 = m_2$, allora $a = 0$: il sistema è in <strong>equilibrio indifferente</strong>.</li>
</ul>
<p>Per trovare la tensione, sostituiamo l'espressione di $a$ nella prima equazione:</p>
<p>$$T = m_1(g + a) = m_1 \\left( g + \\frac{m_2 - m_1}{m_1 + m_2} g \\right) = m_1 g \\left( \\frac{m_1 + m_2 + m_2 - m_1}{m_1 + m_2} \\right)$$</p>
<p>$$T = \\frac{2 m_1 m_2}{m_1 + m_2} \\, g$$</p>`
                },

<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
  <p><strong>📊 Diagramma 3 — Massa sospesa a due funi</strong></p>

  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>
</div>
<p>Poiché il sistema è in equilibrio, la risultante delle forze agenti sulla massa è nulla:</p>
<p>$$\\vec{T}_1 + \\vec{T}_2 + \\vec{P} = 0$$</p>
<p>Proiettiamo lungo gli assi cartesiani (x orizzontale, y verticale verso l'alto).</p>
<p><strong>Componente x:</strong></p>
<p>$$-T_1 \\sin\\theta_1 + T_2 \\sin\\theta_2 = 0$$</p>
<p><strong>Componente y:</strong></p>
<p>$$T_1 \\cos\\theta_1 + T_2 \\cos\\theta_2 - mg = 0$$</p>
<p>Dalla prima equazione:</p>
<p>$$T_2 = T_1 \\frac{\\sin\\theta_1}{\\sin\\theta_2}$$</p>
<p>Sostituiamo nella seconda:</p>
<p>$$T_1 \\cos\\theta_1 + T_1 \\frac{\\sin\\theta_1}{\\sin\\theta_2} \\cos\\theta_2 = mg$$</p>
<p>$$T_1 (\\cos\\theta_1 + \\sin\\theta_1 \\cot\\theta_2) = mg$$</p>
<p>Da cui:</p>
<p>$$T_1 = \\frac{mg}{\\cos\\theta_1 + \\sin\\theta_1 \\cot\\theta_2}$$</p>
<p>Sostituendo i valori numerici ($mg \\approx 20 \\, \\text{N}$, $\\cos 30° \\approx 0.866$, $\\sin 30° = 0.5$, $\\cot 45° = 1$):</p>
<p>$$T_1 = \\frac{20}{0.866 + 0.5 \\times 1} = \\frac{20}{1.366} \\approx 14.7 \\, \\text{N}$$</p>
<p>E per $T_2$:</p>
<p>$$T_2 = T_1 \\frac{\\sin 30°}{\\sin 45°} = 14.7 \\times \\frac{0.5}{\\frac{\\sqrt{2}}{2}} = \\frac{14.7}{\\sqrt{2}} \\approx 10.4 \\, \\text{N}$$</p>`

<li><strong>Risolvete il sistema</strong> di equazioni.</li>
<li><strong>Controllate la coerenza</strong>: il segno dell'accelerazione è compatibile con le ipotesi? La tensione è positiva? I casi limite tornano?</li>
</ol>
<p><strong>Errore frequente:</strong> dimenticare che nella macchina di Atwood le accelerazioni delle due masse sono <strong>opposte in verso</strong> ($a_1 = -a_2$). Se scrivete $a_1 = a_2$ otterrete risultati sbagliati!</p>`

        {
            id: "s13-forza-centripeta",

            title: "Forza Centripeta e Attrito Statico",
            icon: "🚗",
            content: `<p>Vediamo un ultimo esempio che collega i concetti di vincolo e moto circolare: un'automobile in curva.</p>`,
            subsections: [
                {
                    subtitle: "Automobile in curva",
                    content: `<p>Un'automobile di massa $m$ percorre una curva circolare di raggio $R$ a velocità costante $v$. Qual è la <strong>massima velocità</strong> alla quale l'auto può percorrere la curva senza slittare, dato un coefficiente di attrito statico $\\mu_S$?</p>
<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">
  <p><strong>📊 Diagramma 4 — Auto in curva (vista posteriore)</strong></p>
  <p><em>Vista posteriore dell'automobile. Peso $\\vec{P}$ verso il basso, reazione normale $\\vec{R}_N$ verso l'alto, forza di attrito statico $\\vec{F}_S$ diretta orizzontalmente verso il centro della curva (a sinistra).</em></p>
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);">[ immagine da inserire ]</p>
</div>
<p>L'automobile compie un <strong>moto circolare uniforme</strong>, quindi è soggetta a un'accelerazione centripeta $a_c = v^2/R$ diretta verso il centro della curva.</p>
<p><strong>Quale forza fisica agisce da forza centripeta?</strong> L'<strong>attrito statico</strong>! L'auto tende a "partire per la tangente" (proseguire in linea retta). L'attrito statico si oppone a questo slittamento laterale, trattenendo l'auto in traiettoria curva.</p>
<p>Forze agenti sull'auto:</p>
<ul>
<li><strong>Forza peso $\\vec{P}$</strong>, diretta verso il basso.</li>
<li><strong>Reazione normale $\\vec{R}_N$</strong>, diretta verso l'alto.</li>
<li><strong>Forza di attrito statico $\\vec{F}_S$</strong>, diretta orizzontalmente verso il centro della curva.</li>
</ul>
<p><strong>Direzione verticale</strong> (equilibrio):</p>
<p>$$R_N - mg = 0 \\quad \\Rightarrow \\quad R_N = mg$$</p>
<p><strong>Direzione radiale</strong> (forza centripeta):</p>
<p>$$F_S = m \\frac{v^2}{R}$$</p>
<p>La forza di attrito statico ha un valore massimo:</p>
<p>$$F_{S,\\text{max}} = \\mu_S R_N = \\mu_S m g$$</p>
<p>La condizione di non slittamento è $F_c \\le F_{S,\\text{max}}$:</p>
<p>$$m \\frac{v^2}{R} \\le \\mu_S m g$$</p>
<p>La massa $m$ si semplifica! La velocità massima <strong>non dipende dalla massa</strong> del veicolo:</p>
<p>$$\\frac{v^2}{R} \\le \\mu_S g \\quad \\Rightarrow \\quad v^2 \\le \\mu_S g R$$</p>
<p>$$v_{\\text{max}} = \\sqrt{\\mu_S \\, g \\, R}$$</p>
<p>Se l'auto supera questa velocità, l'attrito statico non è più sufficiente a fornire l'accelerazione centripeta richiesta e l'auto inizia a <strong>slittare verso l'esterno della curva</strong>.</p>`
                }

<li><strong>$m_1 = 0$:</strong> $a = g$. La massa $m_2$ è in caduta libera, come ci si aspetta.</li>
<li><strong>$m_2 \\gg m_1$:</strong> $a \\approx g$. La massa pesante "domina" e cade quasi liberamente.</li>
<li><strong>$m_1 \\approx m_2$:</strong> $a \\approx 0$. Il sistema accelera molto lentamente — Atwood usava proprio questo per "rallentare" la caduta e misurare $g$ con strumenti dell'epoca!</li>
</ul>
<p>Per la tensione: $T = \\frac{2m_1 m_2}{m_1 + m_2} g$. Se $m_1 = m_2 = m$, si ottiene $T = mg$, cioè ciascuna massa è in equilibrio sostenuta dalla tensione uguale al proprio peso.</p>`

<p>Notare anche che la velocità massima <strong>non dipende dalla massa</strong>: un'auto pesante e una leggera, a parità di pneumatici e raggio, hanno la stessa $v_{\\text{max}}$.</p>`
