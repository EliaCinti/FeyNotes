    sections: [
        {
            id: "s13-tensione-vincolare",
            type: "section",
            title: "La Tensione come Forza Vincolare",
            icon: "🪢",
            content: `<p>La tensione è una <strong>forza di reazione vincolare</strong> prodotta da una fune tesa. Il modello che considereremo, salvo diversa indicazione, è quello di una <strong>fune ideale</strong>.</p>
<p><strong>Definizione — Fune Ideale:</strong> una fune ideale è un modello fisico che possiede le seguenti proprietà:</p>
<ul>
<li>È <strong>priva di massa</strong> ($m_{\\text{fune}} = 0$).</li>
<li>È <strong>inestensibile</strong>: la sua lunghezza non varia quando viene sottoposta a trazione.</li>
<li>Esercita una forza (tensione) <strong>solo se è tesa</strong>. Se la fune non è tesa, non esercita alcuna forza.</li>
</ul>
<p>La fune rappresenta un vincolo di contatto, ma a differenza di un piano d'appoggio, il contatto è <strong>puntuale</strong>, avvenendo solo all'estremità della fune a cui è collegato un corpo. Il vincolo cessa di esistere nel momento in cui la fune non è più tesa.</p>
<p>Come tutti i vincoli, la presenza di una fune altera il moto libero di un corpo. Ricordiamo che un vincolo è un sistema che, interagendo con un corpo, ne altera il moto libero generando una forza di reazione vincolare. Abbiamo già visto diversi esempi:</p>
<ul>
<li>Un tavolo che impedisce la caduta di un oggetto esercita una <strong>reazione normale</strong>.</li>
<li>L'interazione tra superfici a contatto può generare una forza di <strong>attrito statico o dinamico</strong>.</li>
<li>Un paracadute che interagisce con l'aria genera una forza di <strong>resistenza viscosa</strong>.</li>
<li>Una molla collegata a un corpo esercita una <strong>forza elastica</strong>.</li>
</ul>
<p>La fune tesa rientra in questa categoria, generando una forza che chiamiamo <strong>tensione</strong>.</p>`,
            subsections: [
                {
                    subtitle: "Proprietà della Tensione — Dimostrazione",
                    content: `<p><strong>Proposizione:</strong> In una fune ideale (priva di massa, inestensibile e tesa), la tensione ha la <strong>stessa magnitudine in ogni suo punto</strong>. La sua direzione è sempre <strong>tangente alla fune</strong>, orientata in modo da "tirare" il corpo a cui è collegata.</p>
<p><strong>Dimostrazione:</strong> Consideriamo un segmento di fune ideale tesa, delimitato da due punti A e B, agli estremi del quale sono applicate due forze esterne $\\vec{F}_A$ e $\\vec{F}_B$. Applichiamo la seconda legge di Newton al segmento:</p>
$$\\vec{F}_A + \\vec{F}_B = m_{\\text{fune}} \\vec{a}$$
<p>Poiché la fune è ideale, $m_{\\text{fune}} = 0$. Di conseguenza, il prodotto $m_{\\text{fune}} \\vec{a}$ è nullo, <strong>indipendentemente dall'accelerazione del sistema</strong\gt :</p\gt 
$$\\vec{F}_A + \\vec{F}_B = 0 \\quad \\Rightarrow \\quad \\vec{F}_A = -\\vec{F}_B$$
<p>Questo ci dice che le forze applicate agli estremi di un qualsiasi segmento di fune ideale devono essere <strong>uguali e opposte</strong\gt .</p\gt 
<p>Analizziamo ora le forze agenti sugli elementini infinitesimali di fune nei punti A e B. Considerando l'equilibrio (o il moto) di questi elementini di massa nulla:</p\gt 
$$\\text{In A:} \\quad \\vec{F}_A + \\vec{T}_A = 0$$
<p\gt $$\\text{In B:} \\quad \\vec{F}_B + \\vec{T}_B = 0$$</p\gt <p>Da queste relazioni otteniamo $\\vec{T}_A = -\\vec{F}_A$ e $\\vec{T}_B = -\\vec{F}_B$. Poiché abbiamo dimostrato che $\\vec{F}_A = -\\vec{F}_B$, segue che:</p\gt 
$$\\vec{T}_A = -(-\\vec{F}_B) = \\vec{F}_B = -\\vec{T}_B$$
<p>I vettori tensione ai due estremi sono opposti, $\\vec{T}_A = -\\vec{T}_B$, e quindi hanno la stessa magnitudine:</p\gt 
$$\\| \\vec{T}_A \\| = \\| \\vec{T}_B \\|$$
<p>Poiché A e B sono due punti <strong>arbitrari</strong\gt  della fune, concludiamo che la magnitudine della tensione $T$ è <strong>costante lungo tutta la fune</strong\gt . ∎</p\gt 
<p>La fune ideale è quindi un dispositivo che <strong>trasferisce una forza da un estremo all'altro</strong\gt , mantenendone inalterata la magnitudine. Questo è utilissimo per cambiare la direzione di una forza applicata, come vedremo con le carrucole.</p\gt `
                }

            title: "Due Masse Collegate su un Piano Orizzontale",

            content: `<p>Consideriamo due masse $m_1$ e $m_2$ appoggiate su un piano orizzontale <strong>privo di attrito</strong\gt , collegate da una fune ideale. Una forza orizzontale $\\vec{F}$ viene applicata alla massa $m_1$. Vogliamo determinare l'accelerazione del sistema e la tensione della fune.</p\gt `,

  <p\gt <strong\gt 📊 Diagramma 1 — Due masse collegate su piano orizzontale</strong\gt </p\gt

  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);"\gt [ immagine da inserire ]</p\gt 
</div\gt 
<p>Poiché la fune è inestensibile, le due masse si muovono insieme con la <strong>stessa accelerazione</strong\gt  $\\vec{a}$. Scegliamo un asse $x$ orientato come la forza $\\vec{F}$.</p\gt 
<p\gt <strong>Massa $m_1$:</strong\gt  agiscono la forza esterna $\\vec{F}$ (verso destra) e la tensione $\\vec{T}$ (verso sinistra, la fune "tira" indietro):</p\gt 
$$F - T = m_1 a$$
<p\gt <strong>Massa $m_2$:</strong\gt  agisce solo la tensione $\\vec{T}$ (verso destra, la fune "tira" in avanti):</p\gt 
$$T = m_2 a$$`

$$\\begin{cases} F - T = m_1 a \\\\ T = m_2 a \\end{cases}$$
<p>Sostituiamo la seconda nella prima:</p\gt 
$$F - m_2 a = m_1 a \\quad \\Rightarrow \\quad F = (m_1 + m_2)a$$
<p>Da cui ricaviamo l'<strong>accelerazione</strong\gt :</p\gt 
$$a = \\frac{F}{m_1 + m_2}$$
<p>E sostituendo nella seconda equazione, otteniamo la <strong>tensione</strong\gt :</p\gt 
$$T = m_2 \\cdot \\frac{F}{m_1 + m_2} = F \\frac{m_2}{m_1 + m_2}$$
<p\gt <strong>Controlli di coerenza:</strong\gt </p\gt 
<ul\gt 
<li>L'accelerazione è la stessa che si avrebbe applicando la forza $F$ a un unico corpo di massa totale $M = m_1 + m_2$.</li\gt 
<li>La tensione $T$ è <strong>sempre minore</strong\gt  della forza applicata $F$, poiché il fattore $\\frac{m_2}{m_1 + m_2}$ è sempre minore di 1. La forza $F$ deve accelerare entrambe le masse, mentre la tensione $T$ deve accelerare solo $m_2$.</li\gt 
</ul\gt `

        {
            id: "s13-macchina-atwood",
            type: "section",
            title: "La Macchina di Atwood",
            icon: "⚙️",
            content: `<p>La macchina di Atwood è un dispositivo costituito da una <strong>carrucola ideale</strong\gt  (massa e attrito trascurabili) attorno alla quale scorre una fune ideale, ai cui estremi sono appese due masse $m_1$ e $m_2$. È un problema classico che il professore ha affrontato in dettaglio.</p\gt `,

  <p\gt <strong\gt 📊 Diagramma 2 — Macchina di Atwood</strong\gt </p\gt 
  <p\gt <em>Carrucola ideale fissata in alto. Fune ideale con massa $m_1$ a sinistra e $m_2$ a destra. Asse $y$ verticale orientato verso l'alto. Su ciascuna massa agiscono peso $m_i g$ (verso il basso) e tensione $T$ (verso l'alto).</em\gt </p\gt 
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);"\gt [ immagine da inserire ]</p\gt 
</div\gt 
<p>Scegliamo un asse $y$ verticale orientato verso l'alto. Le forze agenti su ciascuna massa sono la <strong>forza peso</strong\gt  e la <strong>tensione</strong\gt  della fune.</p\gt 
<p>Poiché la fune è ideale e scorre su una carrucola ideale, la tensione $T$ ha la <strong>stessa magnitudine per entrambe le masse</strong\gt .</p\gt 
<p>Il vincolo della fune inestensibile impone che se una massa sale, l'altra scende della stessa quantità. Le accelerazioni sono quindi <strong>uguali in modulo ma opposte in verso</strong\gt .</p\gt 
<p>Assumiamo che $m_2$ scenda e $m_1$ salga. Se $a$ è il modulo dell'accelerazione: $a_1 = a$ (verso l'alto) e $a_2 = -a$ (verso il basso).</p\gt `

                    subtitle: "Equazioni del moto e risoluzione",
                    content: `<p\gt <strong>Massa $m_1$</strong\gt  (sale):</p\gt 
$$T - m_1 g = m_1 a$$
<p\gt <strong>Massa $m_2$</strong\gt  (scende):</p\gt 
$$T - m_2 g = -m_2 a$$
<p>Sistema:</p\gt 
$$\\begin{cases} T - m_1 g = m_1 a \\\\ T - m_2 g = -m_2 a \\end{cases}$$
<p>Sottraiamo la seconda equazione dalla prima:</p\gt 
$$(T - m_1 g) - (T - m_2 g) = m_1 a + m_2 a$$
<p\gt $$-m_1 g + m_2 g = (m_1 + m_2) a$$</p\gt $$(m_2 - m_1)g = (m_1 + m_2) a$$
<p>Da cui l'<strong>accelerazione</strong\gt :</p\gt 
$$a = \\frac{m_2 - m_1}{m_1 + m_2} \\, g$$`
                },
                {
                    subtitle: "Discussione del risultato",
                    content: `<ul\gt 
<li>Se $m_2 \\gt m_1$, allora $a \\gt 0$: $m_2$ scende e $m_1$ sale (come ipotizzato).</li\gt 
<li>Se $m_1 \\gt m_2$, allora $a \\lt 0$: il moto avviene in direzione opposta, $m_1$ scende e $m_2$ sale.</li\gt 
<li>Se $m_1 = m_2$, allora $a = 0$: il sistema è in <strong>equilibrio indifferente</strong\gt  (o si muove a velocità costante).</li\gt 
</ul\gt `

$$T = m_1(g + a) = m_1 \\left( g + \\frac{m_2 - m_1}{m_1 + m_2} g \\right) = m_1 g \\left( \\frac{m_1 + m_2 + m_2 - m_1}{m_1 + m_2} \\right)$$
<p\gt $$T = \\frac{2 m_1 m_2}{m_1 + m_2} \\, g$$</p\gt <p>Notiamo che questa espressione è <strong>simmetrica</strong\gt  in $m_1$ e $m_2$, come ci aspettiamo: la tensione non dipende da quale massa sale o scende.</p\gt `
                }

            title: "Massa Sospesa a Due Funi",
            icon: "🔺",
            content: `<p>Consideriamo una massa $m = 2.04 \\, \\text{kg}$ sospesa in equilibrio da due funi ideali. Gli angoli che le funi formano con la verticale sono $\\theta_1 = 30°$ e $\\theta_2 = 45°$. Vogliamo calcolare le tensioni $T_1$ e $T_2$.</p\gt `,

  <p\gt <strong\gt 📊 Diagramma 3 — Massa sospesa a due funi</strong\gt </p\gt 
  <p\gt <em>Massa $m$ nel punto di congiunzione. Fune sinistra forma angolo $\\theta_1 = 30°$ con la verticale, fune destra forma angolo $\\theta_2 = 45°$ con la verticale. Peso $\\vec{P}$ verso il basso.</em\gt </p\gt 
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);"\gt [ immagine da inserire ]</p\gt 
</div\gt 
<p>Poiché il sistema è in equilibrio, la risultante delle forze è nulla:</p\gt 
$$\\vec{T}_1 + \\vec{T}_2 + \\vec{P} = 0$$
<p>Proiettiamo lungo gli assi cartesiani ($x$ orizzontale, $y$ verticale verso l'alto).</p\gt 
<p\gt <strong>Componente $x$:</strong\gt </p\gt 
$$-T_1 \\sin\\theta_1 + T_2 \\sin\\theta_2 = 0$$
<p\gt <strong>Componente $y$:</strong\gt </p\gt 
$$T_1 \\cos\\theta_1 + T_2 \\cos\\theta_2 - mg = 0$$`
                },

$$T_2 = T_1 \\frac{\\sin\\theta_1}{\\sin\\theta_2}$$
<p>Sostituendo nella seconda:</p\gt 
$$T_1 \\cos\\theta_1 + T_1 \\frac{\\sin\\theta_1}{\\sin\\theta_2} \\cos\\theta_2 = mg$$
<p\gt $$T_1 (\\cos\\theta_1 + \\sin\\theta_1 \\cot\\theta_2) = mg$$</p\gt $$T_1 = \\frac{mg}{\\cos\\theta_1 + \\sin\\theta_1 \\cot\\theta_2}$$
<p\gt <strong>Calcolo numerico:</strong\gt </p\gt 
<ul\gt 
<li\gt $mg = 2.04 \\times 9.8 \\approx 20 \\, \\text{N}$</li\gt 
<li\gt $\\cos(30°) = \\frac{\\sqrt{3}}{2} \\approx 0.866$, $\\sin(30°) = 0.5$</li\gt 
<li\gt $\\cot(45°) = 1$</li\gt 
</ul\gt 
<p\gt $$T_1 = \\frac{20}{0.866 + 0.5 \\times 1} = \\frac{20}{1.366} \\approx 14.7 \\, \\text{N}$$</p\gt $$T_2 = T_1 \\frac{\\sin(30°)}{\\sin(45°)} = 14.7 \\cdot \\frac{0.5}{\\frac{\\sqrt{2}}{2}} = 14.7 \\cdot \\frac{1}{\\sqrt{2}} \\approx 10.4 \\, \\text{N}$$`
                }

        {
            id: "s13-centripeta-attrito",

            title: "Forza Centripeta e Attrito Statico: l'Automobile in Curva",
            icon: "🚗",
            content: `<p>Un'automobile di massa $m$ percorre una curva circolare di raggio $R$ a velocità costante $v$. Qual è la massima velocità alla quale l'auto può percorrere la curva senza slittare, dato un coefficiente di attrito statico $\\mu_S$ tra pneumatici e asfalto?</p\gt `,

                    content: `<div class="diagram-placeholder" style="border: 1px dashed var(--border-light); border-radius: 8px; padding: 20px; margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;"\gt 
  <p\gt <strong\gt 📊 Diagramma 4 — Automobile in curva (vista posteriore)</strong\gt </p\gt 
  <p\gt <em>Auto vista da dietro. Peso $\\vec{P}$ verso il basso, reazione normale $\\vec{R}_N$ verso l'alto, forza di attrito statico $\\vec{F}_S$ diretta orizzontalmente verso il centro della curva (a sinistra).</em\gt </p\gt 
  <p style="margin-top: 8px; font-size: 0.75rem; color: var(--accent);"\gt [ immagine da inserire ]</p\gt 
</div\gt 
<p>L'automobile compie un <strong>moto circolare uniforme</strong\gt , soggetta a un'accelerazione centripeta $a_c = v^2/R$ diretta verso il centro della curva. Le forze agenti sono:</p\gt 
<ul\gt 
<li\gt <strong>Forza peso $\\vec{P}$</strong\gt : diretta verso il basso.</li\gt 
<li\gt <strong>Reazione normale $\\vec{R}_N$</strong\gt : diretta verso l'alto, esercitata dalla strada.</li\gt 
<li\gt <strong>Forza di attrito statico $\\vec{F}_S$</strong\gt : diretta orizzontalmente <strong>verso il centro della curva</strong\gt .</li\gt 
</ul\gt 
<p>È proprio l'<strong>attrito statico</strong\gt  a fornire la forza centripeta! L'auto tende a "partire per la tangente", cioè a proseguire in linea retta. L'attrito statico si oppone a questo slittamento laterale, "trattenendo" l'auto in traiettoria curva.</p\gt `
                },
                {
                    subtitle: "Calcolo della velocità massima",
                    content: `<p\gt <strong>Direzione verticale</strong\gt  (equilibrio):</p\gt 
$$R_N - mg = 0 \\quad \\Rightarrow \\quad R_N = mg$$
<p\gt <strong>Direzione radiale</strong\gt  (orizzontale): l'attrito statico fornisce la forza centripeta:</p\gt 
$$F_S = m \\frac{v^2}{R}$$
<p>La forza di attrito statico ha un valore massimo:</p\gt 
$$F_{S,\\text{max}} = \\mu_S R_N = \\mu_S m g$$
<p>Perché l'auto non slitti, la forza centripeta richiesta deve essere minore o uguale alla massima forza di attrito disponibile:</p\gt 
$$m \\frac{v^2}{R} \\le \\mu_S m g$$
<p>La massa $m$ si semplifica — la velocità massima <strong>non dipende dalla massa del veicolo</strong\gt !</p\gt 
$$\\frac{v^2}{R} \\le \\mu_S g \\quad \\Rightarrow \\quad v^2 \\le \\mu_S g R$$
<p\gt $$v_{\\text{max}} = \\sqrt{\\mu_S \\, g \\, R}$$</p\gt <p>Se l'auto supera questa velocità, l'attrito statico non è più sufficiente: l'auto inizia a <strong>slittare verso l'esterno della curva</strong\gt .</p\gt `
                }
            ],
            formulas: [
                { label: "Velocità massima in curva", latex: "v_{\\text{max}} = \\sqrt{\\mu_S \\, g \\, R}" },
                { label: "Condizione di non slittamento", latex: "\\frac{v^2}{R} \\le \\mu_S g" }
            ]
        },

<p>Se la fune avesse massa, la tensione <strong>non sarebbe costante</strong\gt : sarebbe diversa nei vari punti della fune. A esame, se non è specificato diversamente, assumete sempre fune ideale.</p\gt 
<p>Altro errore frequente: la tensione è una forza che <strong>tira</strong\gt , mai che spinge. Se la fune non è tesa, $T = 0$.</p\gt `

<li>Se $m_1 = m_2$: $a = 0$, equilibrio indifferente. Corretto.</li\gt 
<li>Se $m_2 \\gg m_1$: $a \\approx g$. La massa piccola è "trascinata" quasi in caduta libera.</li\gt 
</ul\gt 
<p>Per la tensione $T = \\frac{2m_1 m_2}{m_1 + m_2} g$:</p\gt 
<ul\gt 
<li>Se $m_1 = m_2 = m$: $T = mg$. Ciascuna massa è sostenuta dal proprio peso: equilibrio.</li\gt 
<li>Se $m_1 = 0$: $T = 0$. La fune è "scarica", coerente con la caduta libera di $m_2$.</li\gt 
</ul\gt `
