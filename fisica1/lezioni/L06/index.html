        content: `<p>Nella lezione precedente abbiamo visto che quando $\\rho = \\text{cost} = R$, il moto e <strong>circolare</strong>. Se fissiamo il piano di rotazione e il verso di rotazione, la posizione del punto lungo la circonferenza $C$ e completamente determinata da un <strong>unico scalare</strong>: l'angolo $\\theta(t)$.</p>
<p>Questo ci permette di passare da una descrizione vettoriale a 3 componenti ($x, y, z$) a una descrizione <strong>scalare</strong> con una sola variabile: la <strong>posizione angolare</strong>. Pero attenzione: queste grandezze <em>sembrano</em> scalari ma <strong>non lo sono</strong> — sono vettoriali. Per la trattazione le consideriamo scalari solo perche fissiamo direzione e verso, e lavoriamo solo con il modulo.</p>`,

<p>• Per spostamenti <strong>infinitesimali</strong>: $ds = R\\,d\\theta$</p>
<p>• Per spostamenti <strong>finiti</strong>: $\\Delta s = R\\,\\Delta\\theta$</p>

<p>$$\\omega(t) = \\frac{d\\theta}{dt}$$</p>
<p><strong>Accelerazione angolare</strong> $\\alpha(t)$: la variazione della rapidita angolare.</p>

<p>$$\\omega(t) = \\omega = \\text{cost}$$</p>
<p>La velocita lineare $v = R\\omega$ sara <strong>costante</strong> poiche sia $v$ che $R$ sono costanti. Questo giustifica il nome "uniforme": il punto percorre archi uguali in tempi uguali.</p>`

<p>$$\\omega(t) = \\omega_0 + \\alpha\\,t$$</p>

<p>$$\\theta(t + T) = \\theta(t) \\qquad \\omega(t + T) = \\omega(t)$$</p>
<p>In un periodo $T$ il punto compie un giro completo, percorrendo la circonferenza intera $2\\pi R$:</p>

<p>• <strong>Modulo</strong>: $|\\vec{\\omega}| = \\frac{d\\theta}{dt} = \\frac{v}{R}$</p>
<p>• <strong>Direzione</strong>: perpendicolare ($\\perp$) al piano di rotazione</p>
<p>• <strong>Verso</strong>: quello dal quale il moto appare <strong>antiorario</strong> (regola della mano destra: se le dita si chiudono nel verso di rotazione, il pollice indica $\\vec{\\omega}$)</p>`

<p>$$\\vec{v} = \\vec{\\omega} \\times \\vec{R}$$</p>
<p>Dove $\\vec{R}$ e il raggio vettore (dal centro della circonferenza al punto). Per trovare il <strong>modulo</strong>:</p>
<p>$$|\\vec{v}| = |\\vec{\\omega}| \\cdot |\\vec{R}| \\cdot \\sin\\varphi$$</p>
<p>Dove $\\varphi$ e l'angolo tra $\\vec{\\omega}$ e $\\vec{R}$. Poiche $\\vec{\\omega} \\perp$ al piano di rotazione e $\\vec{R}$ giace nel piano, l'angolo e sempre $90°$ e $\\sin 90° = 1$, quindi $v = \\omega R$ come gia sapevamo. Ma il prodotto vettoriale ci da anche la <strong>direzione</strong>: $\\vec{v}$ e tangente alla traiettoria!</p>`

<p>$$\\vec{a} = \\frac{d\\vec{v}}{dt} = \\underbrace{\\left(\\frac{d\\vec{\\omega}}{dt} \\times \\vec{R}\\right)}_{\\vec{a}_T \\text{ (tangenziale)}} + \\underbrace{\\left(\\vec{\\omega} \\times \\vec{v}\\right)}_{\\vec{a}_N \\text{ (normale)}}$$</p>
<p>Nota che $\\frac{d\\vec{\\omega}}{dt} = \\vec{\\alpha}$ (l'accelerazione angolare vettoriale), e che $\\vec{\\alpha} \\parallel \\vec{\\omega}$ (stessa direzione, perpendicolare al piano).</p>`

<p>$$a_N = \\frac{v_F^2}{R} = \\frac{(2.24)^2}{1} \\approx 5.02 \\;\\text{m/s}^2 \\quad \\text{(centripeta)}$$</p>
