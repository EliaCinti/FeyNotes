<p>Il risultato fondamentale da ricordare è:</p>

            content: `<p>Il calcolo del lavoro tramite l'integrale può essere complesso. Per una classe speciale di forze, dette <strong>conservative</strong>, possiamo introdurre una funzione — l'<strong>energia potenziale</strong> — che semplifica notevolmente il calcolo.</p>
<p>Una forza $\\vec{F}$ è detta <strong>conservativa</strong> se il lavoro $L_{A \\to B}$ che essa compie per spostare un corpo da un punto A a un punto B può essere espresso come la variazione, cambiata di segno, di una funzione della sola posizione $E_p$, chiamata <strong>energia potenziale</strong>:</p>

<p>Si definisce <strong>energia meccanica</strong> ($E_m$) di un sistema la somma della sua energia cinetica e della sua energia potenziale:</p>

<p>$$E_{k,i} + E_{p,i} = E_{k,f} + E_{p,f}$$</p>
<p><strong>Dimostrazione:</strong> Partiamo dal teorema dell'energia cinetica: $L_{\\text{tot}} = \\Delta E_k$. Se tutte le forze sono conservative, allora $L_{\\text{tot}} = L_c = -\\Delta E_p$. Uguagliando:</p>
<p>$$\\Delta E_k = -\\Delta E_p$$</p>
<p>$$E_{k,f} - E_{k,i} = -(E_{p,f} - E_{p,i})$$</p>
<p>$$E_{k,f} + E_{p,f} = E_{k,i} + E_{p,i}$$</p>
<p>$$E_{m,f} = E_{m,i} \\Rightarrow \\Delta E_m = 0$$</p>`

<p>Quando comprimiamo o allunghiamo una molla, compiamo lavoro su di essa. Questa energia non viene persa, ma <strong>immagazzinata</strong> nel sistema sotto forma di energia potenziale elastica. La molla accumula la capacità di compiere lavoro positivo in seguito, quando verrà rilasciata.</p>`,

<p>$$\\Delta E_k = L_c + L_{nc} = -\\Delta E_p + L_{nc}$$</p>
<p>Riorganizzando:</p>

<p>Applichiamo il teorema dell'energia meccanica: $L_{nc} = \\Delta E_m$.</p>`,

                    subtitle: "Calcolo del lavoro non conservativo",
                    content: `<p>L'unica forza non conservativa è l'attrito. La forza di attrito è $F_{att} = \\mu_d N = \\mu_d mg \\cos\\theta$, diretta in verso opposto al moto. Se $x'_B$ è lo spazio percorso lungo il piano:</p>
<p>$$L_{nc} = L_{att} = -F_{att} \\cdot x'_B = -\\mu_d mg \\cos\\theta \\cdot x'_B$$</p>`

<p><strong>Stato finale:</strong> $E_{m,f} = 0 + mgh'$</p>
<p>Quindi:</p>
<p>$$\\Delta E_m = mgh' - \\frac{1}{2}mv_0^2$$</p>`
                },
                {
                    subtitle: "Soluzione",
                    content: `<p>Uguagliamo le due espressioni:</p>
<p>$$-\\mu_d mg \\cos\\theta \\cdot x'_B = mgh' - \\frac{1}{2}mv_0^2$$</p>
<p>Le due incognite $h'$ e $x'_B$ sono legate dalla relazione $h' = x'_B \\sin\\theta$, da cui $x'_B = h' / \\sin\\theta$. Sostituendo:</p>
<p>$$-\\mu_d mg \\cos\\theta \\cdot \\frac{h'}{\\sin\\theta} = mgh' - \\frac{1}{2}mv_0^2$$</p>
<p>$$-\\mu_d mg \\cot\\theta \\cdot h' = mgh' - \\frac{1}{2}mv_0^2$$</p>
<p>Risolviamo per $h'$:</p>
<p>$$\\frac{1}{2}v_0^2 = gh'(1 + \\mu_d \\cot\\theta)$$</p>
<p>$$h' = \\frac{v_0^2}{2g(1 + \\mu_d \\cot\\theta)}$$</p>
<p>Il denominatore è maggiore di $2g$, quindi $h' \\lt h = \\frac{v_0^2}{2g}$, come ci aspettavamo. L'attrito ha compiuto lavoro negativo, causando una diminuzione dell'energia meccanica. L'energia "persa" non è distrutta, ma <strong>trasformata in calore</strong>.</p>`

        {
            id: "s15-potenza",
            type: "section",
            title: "Potenza",
            icon: "⏱️",
            content: `<p>In molti fenomeni meccanici, non è importante solo la <strong>quantità</strong> di lavoro compiuto, ma anche la <strong>rapidità</strong> con cui questo avviene.</p>
<p>La <strong>potenza</strong> ($P$) è definita come il rapporto tra il lavoro $L$ compiuto e l'intervallo di tempo $\\Delta t$ impiegato:</p>
<p>$$P = \\frac{L}{\\Delta t}$$</p>
<p>Se la potenza non è costante, si definisce la <strong>potenza istantanea</strong>:</p>
<p>$$P(t) = \\frac{dL}{dt}$$</p>
<p>L'unità di misura nel SI è il <strong>Watt</strong> (W): $1 \\, \\text{W} = 1 \\, \\frac{\\text{J}}{\\text{s}}$.</p>`,
            subsections: [
                {
                    subtitle: "Potenza in funzione di forza e velocità",
                    content: `<p>La potenza può essere espressa in funzione della forza e della velocità. Poiché il lavoro infinitesimo è $dL = \\vec{F} \\cdot d\\vec{s}$:</p>
<p>$$P = \\frac{dL}{dt} = \\frac{\\vec{F} \\cdot d\\vec{s}}{dt} = \\vec{F} \\cdot \\frac{d\\vec{s}}{dt} = \\vec{F} \\cdot \\vec{v}$$</p>
<p>La potenza istantanea è il <strong>prodotto scalare</strong> tra la forza applicata e la velocità del corpo.</p>`
                },

                    subtitle: "Esempio: automobile con potenza costante",

<p>Il lavoro compiuto dal motore è $L = P \\cdot \\Delta t$. Questo lavoro produce una variazione di energia cinetica:</p>
<p>$$P \\cdot \\Delta t = \\frac{1}{2} m v_f^2 - \\frac{1}{2} m v_0^2$$</p>
<p>Risolvendo per $v_f$:</p>
<p>$$v_f = \\sqrt{v_0^2 + \\frac{2P \\Delta t}{m}}$$</p>
<p>La velocità finale dipende dalla potenza del motore, dal tempo di accelerazione e dalla massa del veicolo, come ci si aspetta intuitivamente.</p>`
