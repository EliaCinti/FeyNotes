                    content: `<p>Un sistema lineare $S$ è <strong>compatibile</strong> (cioè ammette soluzioni) se e solo se il rango della matrice incompleta $A$ è uguale al rango della matrice completa $(A|b)$:</p>

<p>Consideriamo un sistema lineare <strong>quadrato</strong> $S: Ax = b$, dove $A$ è una matrice $n \\times n$ con $\\det(A) \\neq 0$. Un tale sistema si dice <strong>sistema di Cramer</strong>.</p>`,

<p>La formula per l'inversa è $A^{-1} = \\frac{1}{\\det(A)} A^*$, dove $A^*$ è la <strong>matrice aggiunta classica</strong> (trasposta della matrice dei cofattori). Quindi:</p>
<p>$$y = \\frac{1}{\\det(A)} A^* b$$</p>
<p>La $i$-esima componente di $y$ è:</p>
<p>$$y_i = \\frac{1}{\\det(A)} \\sum_{j=1}^{n} C_{ji} \\, b_j$$</p>
<p>dove $C_{ji}$ è il cofattore $(j,i)$ di $A$. Ricordiamo che la riga $i$ di $A^*$ è $(C_{1i}, C_{2i}, \\dots, C_{ni})$ perché $A^*$ è la trasposta della matrice dei cofattori.</p>
<p>Ora, l'espressione $\\sum_{j=1}^{n} b_j \\, C_{ji}$ è esattamente lo <strong>sviluppo di Laplace</strong> del determinante della matrice $A_i$ rispetto alla sua $i$-esima colonna. Infatti, in $A_i$ la colonna $i$ contiene gli elementi $b_1, b_2, \\dots, b_n$, e i cofattori relativi a quella colonna sono gli stessi $C_{1i}, C_{2i}, \\dots, C_{ni}$ di $A$ (perché le altre colonne sono identiche).</p>
<p>Quindi $\\sum_{j=1}^{n} b_j \\, C_{ji} = \\det(A_i)$, e si ottiene la tesi:</p>
<p>$$y_i = \\frac{\\det(A_i)}{\\det(A)}$$</p>`

<p>Supponiamo che $\\text{rango}(A) = \\text{rango}(A|b) = p$ (sistema compatibile). Sia $M$ un minore di ordine $p$ di $A$ con $\\det(M) \\neq 0$.</p>
<p>A meno di riordinare righe e colonne, supponiamo che $M$ sia il minore fondamentale in alto a sinistra. Il sistema può essere riscritto separando le prime $p$ variabili (<strong>principali</strong>) dalle restanti $n - p$ (<strong>libere</strong>):</p>
<p>$$M \\begin{pmatrix} x_1 \\\\ \\vdots \\\\ x_p \\end{pmatrix} + N \\begin{pmatrix} x_{p+1} \\\\ \\vdots \\\\ x_n \\end{pmatrix} = b'$$</p>
<p>dove $b'$ contiene i termini noti delle prime $p$ equazioni (le altre sono linearmente dipendenti e vengono eliminate).</p>
<p>Portando a destra le variabili libere:</p>
<p>$$M \\begin{pmatrix} x_1 \\\\ \\vdots \\\\ x_p \\end{pmatrix} = b' - N \\begin{pmatrix} x_{p+1} \\\\ \\vdots \\\\ x_n \\end{pmatrix}$$</p>
<p>Questo è un <strong>sistema di Cramer $p \\times p$</strong> nelle incognite $(x_1, \\dots, x_p)$, dove il termine noto dipende dalle variabili libere. Si applica quindi la regola di Cramer per esprimere le variabili principali in funzione di quelle libere.</p>`

<p>$$x = 2\\lambda - 3, \\quad y = \\lambda - 2, \\quad z = \\lambda$$</p>

<li><strong>Sistemi con parametri</strong>: Cramer può dare formule compatte che mostrano la dipendenza dal parametro.</li>
<li><strong>Sistemi grandi o numerici</strong>: il metodo di Gauss (eliminazione) è sempre preferibile.</li>

            back: "Un sistema lineare $S: Ax = b$ è compatibile se e solo se $\\text{rango}(A) = \\text{rango}(A|b)$. In tal caso, se questo rango è $p$ e le incognite sono $n$, le soluzioni sono $\\infty^{n-p}$."
        },
        {
            type: "domanda",
            front: "Perché vale sempre che $\\text{rango}(A) \\le \\text{rango}(A|b)$?",
            back: "Perché $A$ è una sottomatrice di $(A|b)$: aggiungere una colonna può solo aumentare (o mantenere uguale) il rango, mai diminuirlo. Ogni combinazione lineare delle colonne di $A$ è anche combinazione lineare delle colonne di $(A|b)$."
        },
        {
            type: "definizione",
            front: "Cos'è un sistema di Cramer?",
            back: "È un sistema lineare $Ax = b$ dove $A$ è una matrice quadrata $n \\times n$ con $\\det(A) \\neq 0$. Un sistema di Cramer ammette sempre un'unica soluzione."
        },
        {
            type: "formula",
            front: "Enuncia la regola di Cramer per la $i$-esima componente della soluzione.",
            back: "Data $S: Ax = b$ con $\\det(A) \\neq 0$, la $i$-esima componente della soluzione è $y_i = \\frac{\\det(A_i)}{\\det(A)}$, dove $A_i$ è la matrice ottenuta da $A$ sostituendo la $i$-esima colonna con il vettore $b$."
        },
        {
            type: "dimostrazione",
            front: "Dimostra la regola di Cramer.",
            back: "Si parte da $y = A^{-1}b = \\frac{1}{\\det(A)} A^* b$. La componente $i$-esima è $y_i = \\frac{1}{\\det(A)} \\sum_{j=1}^{n} C_{ji} b_j$. La somma $\\sum_{j=1}^{n} b_j C_{ji}$ è lo sviluppo di Laplace di $\\det(A_i)$ rispetto alla colonna $i$, perché in $A_i$ la colonna $i$ contiene $b$ e i cofattori sono gli stessi di $A$. Quindi $y_i = \\frac{\\det(A_i)}{\\det(A)}$."
        },
        {
            type: "tranello",
            front: "Si può applicare Cramer a un sistema rettangolare (non quadrato)?",
            back: "Non direttamente, ma sì tramite generalizzazione: si identifica un minore fondamentale $M$ di ordine $p$ (il rango), si separano le variabili in principali e libere, e si applica Cramer al sistema ridotto $p \\times p$. Le variabili principali si esprimono in funzione di quelle libere."
        },
        {
            type: "tranello",
            front: "Quando si discute un sistema con parametro, cosa si rischia di dimenticare?",
            back: "Si rischia di dimenticare di discutere tutti i valori del parametro che annullano i pivot nella forma a scala. Ogni pivot nullo cambia il rango e quindi la natura del sistema. Nell'esempio della lezione, i pivot $k$, $k$, $k+1$ generano i casi critici $k = 0$ (incompatibile) e $k = -1$ ($\\infty^1$ soluzioni)."
        },
        {
            type: "domanda",

            back: "Vantaggio: fornisce una formula esplicita e chiusa per ogni componente della soluzione, utile in dimostrazioni e analisi teorica. Svantaggio: richiede il calcolo di $n+1$ determinanti di ordine $n$, con costo computazionale molto superiore all'eliminazione di Gauss per $n$ grande."
        },
        {

            back: "Per $k = 0$, la matrice a scala diventa tale che $\\text{rango}(A_0) = 2$ ma $\\text{rango}(A_0|b_0) = 3$ (l'ultima riga ridotta è $(0\\ 0\\ 0\\ |\\ {-1})$, cioè l'equazione $0 = -1$). Per Rouché-Capelli, ranghi diversi implicano incompatibilità."
        }
    ]
};
