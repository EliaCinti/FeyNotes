                    content: `<p>Siano $A$ e $B$ due matrici $m \\times n$. Diciamo che $A$ è <strong>equivalente per righe</strong> a $B$, e scriviamo $A \\sim_r B$, se $B$ si ottiene da $A$ tramite un numero finito di operazioni elementari sulle righe.</p>

<p>$$A = \\begin{bmatrix} 1 & 1 & 1 & 1 \\\\ 2 & 0 & 1 & 3 \\\\ 3 & 1 & 2 & 4 \\\\ 1 & 0 & 0 & 0 \\\\ 0 & 1 & 0 & -2 \\end{bmatrix}$$</p>

<p>$$S = \\begin{bmatrix} 1 & 1 & 1 & 1 \\\\ 0 & -2 & -1 & 1 \\\\ 0 & 0 & -\\frac{1}{2} & -\\frac{3}{2} \\\\ 0 & 0 & 0 & 0 \\\\ 0 & 0 & 0 & 0 \\end{bmatrix}$$</p>
<p>Ci sono 3 righe non nulle, quindi $\\dim(U + V) = 3$ e una base per $U + V$ è:</p>
<p>$$\\left\\{ (1, 1, 1, 1), \\; (0, -2, -1, 1), \\; \\left(0, 0, -\\tfrac{1}{2}, -\\tfrac{3}{2}\\right) \\right\\}$$</p>`

<p><strong>Svolgimento.</strong> Disponiamo i generatori di $U$ come righe e riduciamo a scala:</p>
<p>$$A = \\begin{bmatrix} 1 & 1 & -1 & 1 \\\\ 1 & 2 & 0 & 2 \\\\ 1 & 2 & 0 & 3 \\end{bmatrix} \\overset{e_{21}{\\longrightarrow}(-1),\\, e_{31}(-1)} \\begin{bmatrix} 1 & 1 & -1 & 1 \\\\ 0 & 1 & 1 & 1 \\\\ 0 & 1 & 1 & 2 \\end{bmatrix} \\overset{e_{32}{\\longrightarrow}(-1)} \\begin{bmatrix} 1 & 1 & -1 & 1 \\\\ 0 & 1 & 1 & 1 \\\\ 0 & 0 & 0 & 1 \\end{bmatrix} = S$$</p>
<p>Quindi $\\dim U = 3$. I pivot di $S$ occupano le colonne 1, 2 e 4. Manca un pivot nella <strong>colonna 3</strong>. Per completare a una base di $\\mathbb{R}^4$, inseriamo il vettore canonico $\\mathbf{e}_3 = (0, 0, 1, 0)$:</p>
<p>$$T = \\begin{bmatrix} 1 & 1 & -1 & 1 \\\\ 0 & 1 & 1 & 1 \\\\ 0 & 0 & 1 & 0 \\\\ 0 & 0 & 0 & 1 \\end{bmatrix}$$</p>
<p>$T$ è a scala con 4 righe non nulle, quindi ha rango 4. Poniamo:</p>
<p>$$V := \\text{Span}(\\mathbf{e}_3) = \\text{Span}((0, 0, 1, 0))$$</p>
<p><strong>Verifica:</strong> $\\dim U + \\dim V = 3 + 1 = 4 = \\dim \\mathbb{R}^4$, e $U \\cap V = \\{\\mathbf{0}\\}$ (perché $\\mathbf{e}_3$ produce un nuovo pivot).</p>`
                }
