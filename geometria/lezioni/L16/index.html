                    subtitle: "Enunciato del teorema",
                    content: `<p><strong>Teorema degli Orlati:</strong> Sia $M$ un minore non singolare di una matrice $A$. Se tutti gli orlati di $M$ sono singolari, allora $M$ è un minore fondamentale di $A$.</p>
<p>In altre parole: se troviamo un minore non singolare $M$ di ordine $p$ e tutti i minori di ordine $p+1$ che lo contengono (gli orlati) hanno determinante nullo, allora il rango della matrice è esattamente $p$.</p>`

                    content: `<p>Sia $M$ un minore non singolare di ordine $p \\times p$, con $\\det(M) \\neq 0$. Supponiamo che $M$ si ottenga dalle componenti comuni alle righe $A_{i_1}, \\dots, A_{i_p}$ e alle colonne $A^{j_1}, \\dots, A^{j_p}$ della matrice $A$:</p>
<p>$$M = (a_{i_k, j_h}) \\quad \\text{con } k,h \\in \\{1, \\dots, p\\}$$</p>
<p>Poiché $M$ è non singolare, le sue righe sono linearmente indipendenti. Di conseguenza, anche le righe $A_{i_1}, \\dots, A_{i_p}$ della matrice $A$ sono linearmente indipendenti e formano un <strong>sistema libero</strong>.</p>
<p>Per dimostrare che $M$ è un minore fondamentale, dobbiamo far vedere che $\\text{rango}(A) = p$. Questo equivale a dimostrare che <strong>ogni altra riga</strong> di $A$ può essere espressa come combinazione lineare delle righe $A_{i_1}, \\dots, A_{i_p}$.</p>`

<p>$$N = \\begin{pmatrix} a_{i_1, j_1} & \\dots & a_{i_1, j_p} & a_{i_1, j} \\\\ \\vdots & \\ddots & \\vdots & \\vdots \\\\ a_{i_p, j_1} & \\dots & a_{i_p, j_p} & a_{i_p, j} \\\\ a_{i, j_1} & \\dots & a_{i, j_p} & a_{i, j} \\end{pmatrix}$$</p>
<p>Analizziamo $\\det(N)$ in due casi:</p>
<p><strong>Caso 1:</strong> $j \\notin \\{j_1, \\dots, j_p\\}$. Allora $N$ è un vero orlato di $M$ (riga e colonna nuove). Per ipotesi del teorema, tutti gli orlati di $M$ sono singolari, quindi $\\det(N) = 0$.</p>
<p><strong>Caso 2:</strong> $j \\in \\{j_1, \\dots, j_p\\}$. Supponiamo $j = j_k$: la colonna $(p+1)$-esima di $N$ è identica alla colonna $k$-esima. Una matrice con due colonne uguali ha determinante nullo, quindi $\\det(N) = 0$.</p>
<p>In <strong>ogni caso</strong>: $\\det(N) = 0$.</p>`

                    content: `<p>Sviluppiamo $\\det(N)$ secondo Laplace rispetto all'<strong>ultima colonna</strong>:</p>
<p>$$\\det(N) = \\sum_{k=1}^{p} a_{i_k, j} \\, C_{k, p+1} + a_{i, j} \\, C_{p+1, p+1} = 0$$</p>
<p>Poniamo $\\lambda_k = C_{k, p+1}$ per $k = 1, \\dots, p$ e $\\lambda = C_{p+1, p+1}$. L'equazione diventa:</p>
<p>$$\\lambda_1 a_{i_1, j} + \\dots + \\lambda_p a_{i_p, j} + \\lambda \\, a_{i, j} = 0$$</p>
<p><strong>Osservazione cruciale:</strong> i cofattori $\\lambda_1, \\dots, \\lambda_p, \\lambda$ <strong>non dipendono</strong> dalla colonna $j$ scelta, perché per calcolarli si elimina sempre l'ultima colonna. Essi dipendono solo dalle prime $p$ colonne di $N$ e dalle righe scelte.</p>
<p>In particolare, il cofattore $\\lambda = C_{p+1, p+1} = (-1)^{(p+1)+(p+1)} \\det(M) = \\det(M) \\neq 0$.</p>
<p>Poiché l'equazione vale <strong>per ogni</strong> colonna $j$, possiamo scrivere la relazione vettoriale tra righe complete:</p>
<p>$$\\lambda_1 A_{i_1} + \\lambda_2 A_{i_2} + \\dots + \\lambda_p A_{i_p} + \\lambda A_i = \\boldsymbol{0}$$</p>
<p>Dato che $\\lambda \\neq 0$, possiamo esplicitare $A_i$:</p>
<p>$$A_i = -\\frac{1}{\\lambda} \\left( \\sum_{k=1}^{p} \\lambda_k A_{i_k} \\right) = \\sum_{k=1}^{p} \\left(-\\frac{\\lambda_k}{\\lambda}\\right) A_{i_k}$$</p>
<p>Questo dimostra che <strong>ogni</strong> riga $A_i$ non appartenente al sistema libero iniziale è combinazione lineare di $A_{i_1}, \\dots, A_{i_p}$. Quindi lo spazio delle righe ha dimensione $p$, il rango di $A$ è $p$, e $M$ è un minore fondamentale. $\\blacksquare$</p>`
