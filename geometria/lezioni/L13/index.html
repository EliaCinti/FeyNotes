            content: `<p>Nelle lezioni precedenti abbiamo visto che il <strong>rango</strong> di una matrice $A$ di dimensione $m \\times n$ è la dimensione dello spazio generato dalle sue righe (o colonne).</p>
<p>Il metodo più pratico per calcolare il rango consiste nell'applicare l'<strong>algoritmo di eliminazione di Gauss</strong>. Tramite operazioni elementari sulle righe (scambio di righe $P_{ij}$, moltiplicazione per uno scalare, somma di un multiplo di una riga a un'altra $E_{ij}(k)$), si porta la matrice $A$ in una matrice a scala $S$:</p>

<p>$$\\text{rk}(A) = \\text{rk}(S)$$</p>
<p>Poiché $S$ è una matrice a scala, il suo rango è semplicemente calcolabile a vista:</p>

<p>$$\\text{rk}(A \\cdot B) \\leq \\text{rk}(A)$$</p>
<p><strong>Dimostrazione.</strong> Sia $S$ la matrice a scala equivalente ad $A$ ($A \\sim_r S$). Sappiamo che $A$ può essere ottenuta moltiplicando $S$ a sinistra per una serie di matrici elementari $E_i$:</p>
<p>$$A = E_1 \\cdot E_2 \\cdots E_k \\cdot S$$</p>
<p>Se moltiplichiamo entrambi i membri a destra per $B$:</p>
<p>$$A \\cdot B = E_1 \\cdot E_2 \\cdots E_k \\cdot (SB)$$</p>
<p>Questo significa che $AB$ si ottiene da $SB$ tramite operazioni elementari sulle righe, ovvero $AB \\sim_r SB$. Di conseguenza:</p>
<p>$$\\text{rk}(AB) = \\text{rk}(SB)$$</p>
<p>Ora basta dimostrare che $\\text{rk}(SB) \\leq \\text{rk}(S)$. Quando eseguiamo il prodotto $S \\cdot B$, se $S$ ha una riga <strong>completamente nulla</strong>, la corrispondente riga in $SB$ sarà anch'essa nulla. Quindi:</p>
<p>$$\\#\\text{ righe nulle di } S \\leq \\#\\text{ righe nulle di } SB$$</p>
<p>Poiché $\\text{rk}(S) = m - (\\#\\text{ righe nulle di } S)$ e $\\text{rk}(SB) = m - (\\#\\text{ righe nulle di } SB)$, deduciamo:</p>

<p>$$\\text{rk}(A \\cdot B) \\leq \\text{rk}(B)$$</p>

            front: "Dimostra: A quadrata n×n è invertibile se e solo se rk(A) = n.",
            back: "Se $A$ è invertibile: $n = \\text{rk}(I_n) = \\text{rk}(A \\cdot A^{-1}) \\leq \\text{rk}(A) \\leq n$, quindi $\\text{rk}(A) = n$. Viceversa, se $\\text{rk}(A) = n$, Gauss non produce righe nulle, la forma a scala ha $n$ pivot, e $A$ è prodotto di matrici elementari (tutte invertibili), quindi invertibile."
        },
        {
            type: "definizione",
            front: "Come si definisce il determinante con lo sviluppo di Laplace?",
            back: "Fissata una riga $i$: $\\det(A) = \\sum_{j=1}^{n} a_{ij}(-1)^{i+j} \\det(A_{ij})$, dove $A_{ij}$ è la sottomatrice ottenuta cancellando riga $i$ e colonna $j$. Il prodotto $(-1)^{i+j}\\det(A_{ij})$ è il complemento algebrico di $a_{ij}$."
        },
        {
            type: "formula",
            front: "Qual è il determinante di una matrice 2×2?",
            back: "Per $A = \\begin{bmatrix} a & b \\\\ c & d \\end{bmatrix}$: $\\det(A) = ad - bc$ (prodotto diagonale principale meno prodotto diagonale secondaria)."
        },
        {
            type: "domanda",
            front: "Qual è il determinante di una matrice triangolare?",
            back: "È il prodotto degli elementi sulla diagonale principale: $\\det(A) = a_{11} \\cdot a_{22} \\cdots a_{nn}$. In particolare $\\det(I) = 1$."
        },
        {
            type: "domanda",
            front: "Che effetto hanno le operazioni elementari sul determinante?",
            back: "1) <strong>Scambio di righe</strong> ($P_{ij}$): $\\det$ cambia segno. 2) <strong>Somma di multiplo</strong> ($E_{ij}(k)$): $\\det$ non cambia. 3) <strong>Moltiplicazione riga per $k$</strong>: $\\det$ viene moltiplicato per $k$."
        },
        {
            type: "tranello",
            front: "Errore classico: applicare Gauss per calcolare il determinante dimenticando qualcosa. Cosa?",
            back: "Dimenticarsi di <strong>contare gli scambi di riga</strong>! Ogni scambio cambia il segno del determinante. Formula corretta: $\\det(A) = (-1)^{\\#\\text{scambi}} \\cdot \\prod_i \\text{pivot}_i$. Altro errore: se si moltiplica una riga per uno scalare $k$ per comodità, bisogna dividere il risultato finale per $k$."
        },
        {
            type: "domanda",
            front: "Per lo sviluppo di Laplace, come si sceglie la riga o colonna migliore?",
            back: "Si sceglie la riga o colonna con il <strong>maggior numero di zeri</strong>, perché ogni zero annulla il corrispondente termine dello sviluppo, riducendo il numero di sottodeterminanti da calcolare."
        },
        {
            type: "formula",
            front: "Come si calcola det(A) tramite il metodo di Gauss?",
            back: "Si riduce $A$ a forma a scala $S$ (triangolare superiore) usando solo scambi e somme di multipli. Poi: $\\det(A) = (-1)^{\\#\\text{scambi}} \\cdot \\det(S)$, dove $\\det(S) = \\prod_i a_{ii}$ è il prodotto dei pivot."
        }
    ]
};
