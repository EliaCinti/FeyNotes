<p>Per dimostrarlo abbiamo bisogno di un lemma preliminare sull'invarianza del rango.</p>`,

                    content: `<p><strong>Lemma:</strong> Sia $A$ una matrice $m \\times n$, $P$ una matrice invertibile $m \\times m$ e $Q$ una matrice invertibile $n \\times n$. Allora il rango di $A$ è uguale al rango di $PAQ$. In altre parole, la moltiplicazione per una matrice invertibile (a destra o a sinistra) non altera il rango.</p>
<p><strong>Dimostrazione.</strong> Per l'algoritmo di Gauss-Jordan, poiché $P$ è invertibile, esistono matrici elementari $E_1, E_2, \\dots, E_h$ tali che $E_1 \\cdot E_2 \\cdots E_h \\cdot P = I$. Ne consegue:</p>
<p>$$(E_1 \\cdot E_2 \\cdots E_h) \\cdot (P \\cdot A) = (E_1 \\cdot E_2 \\cdots E_h \\cdot P) \\cdot A = I \\cdot A = A$$</p>
<p>Ciò significa che le stesse operazioni elementari che portano $P$ in $I$ portano $PA$ in $A$. Poiché le operazioni elementari non alterano il rango, il rango di $PA$ è uguale al rango di $A$.</p>
<p>Per la seconda parte, ragioniamo in modo simile usando le operazioni sulle colonne di $Q$. Poiché $Q$ è invertibile, esistono matrici elementari $F_1, F_2, \\dots, F_k$ tali che $Q \\cdot F_1 \\cdot F_2 \\cdots F_k = I$. Segue che:</p>
<p>$$(P \\cdot A \\cdot Q) \\cdot (F_1 \\cdot F_2 \\cdots F_k) = (P \\cdot A) \\cdot (Q \\cdot F_1 \\cdot F_2 \\cdots F_k) = PA$$</p>
<p>Cioè $PA$ si ottiene da $PAQ$ tramite operazioni elementari sulle colonne. Poiché le operazioni elementari non alterano il rango, il rango di $PAQ$ è uguale al rango di $PA$, e dunque al rango di $A$. $\\square$</p>`
                },

                    subtitle: "Dimostrazione del Teorema di Sylvester",
                    content: `<p>Siano $D$ e $D'$ due matrici reali diagonali congruenti. Per definizione esiste una matrice invertibile $P$ tale che $D' = P^T D P$. Per il lemma, $D$ e $D'$ hanno lo stesso rango. Resta da provare che l'indice $r$ di $D$ coincide con l'indice $r'$ di $D'$.</p>
<p><strong>Da ricordare:</strong> $D' = P^T D P$ significa che $D$ e $D'$ sono le matrici di Gram della stessa forma bilineare $\\phi$ rispetto a due basi diverse $\\mathcal{B}$ e $\\mathcal{B}'$ di $\\mathbb{R}^n$, dove $P$ è la matrice di cambiamento di base.</p>
<p>Poiché $D$ e $D'$ sono congruenti, esiste dunque una forma bilineare simmetrica $\\phi: \\mathbb{R}^n \\times \\mathbb{R}^n \\to \\mathbb{R}$ e basi $\\mathcal{B}$ e $\\mathcal{B}'$ di $\\mathbb{R}^n$ tali che $G_{\\mathcal{B}}(\\phi) = D$ e $G_{\\mathcal{B}'}(\\phi) = D'$.</p>
<p>Riordiniamo i vettori di $\\mathcal{B}$ in modo che la diagonale principale di $D$ sia:</p>
<p>$$(d_1, \\dots, d_r, -d_{r+1}, \\dots, -d_p, 0, \\dots, 0)$$</p>
<p>con tutti i $d_i \\gt 0$. Denotando con $\\mathbf{b}_i$ i vettori di $\\mathcal{B}$:</p>
<ul>
<li>$\\phi(\\mathbf{b}_i, \\mathbf{b}_j) = 0$ per ogni $i \\ne j$</li>
<li>$\\phi(\\mathbf{b}_i, \\mathbf{b}_i) = d_i \\gt 0$ per $1 \\le i \\le r$</li>
<li>$\\phi(\\mathbf{b}_i, \\mathbf{b}_i) = -d_i \\lt 0$ per $r+1 \\le i \\le p$</li>
<li>$\\phi(\\mathbf{b}_i, \\mathbf{b}_i) = 0$ per $p+1 \\le i \\le n$</li>
</ul>
<p>Analogamente per $\\mathcal{B}'$ con diagonale $(d'_1, \\dots, d'_{r'}, -d'_{r'+1}, \\dots, -d'_p, 0, \\dots, 0)$ e vettori $\\mathbf{b}'_i$.</p>
<p><strong>Obiettivo:</strong> provare che $r = r'$.</p>
<p>Consideriamo il sistema di vettori:</p>
<p>$$\\mathcal{S} := \\{\\mathbf{b}_1, \\dots, \\mathbf{b}_r,\\, \\mathbf{b}'_{r'+1}, \\dots, \\mathbf{b}'_n\\}$$</p>
<p>Proviamo che $\\mathcal{S}$ è <strong>linearmente indipendente</strong>. Sia:</p>
<p>$$h_1 \\mathbf{b}_1 + \\cdots + h_r \\mathbf{b}_r + k_{r'+1} \\mathbf{b}'_{r'+1} + \\cdots + k_n \\mathbf{b}'_n = \\boldsymbol{0}_V \\quad (1)$$</p>
<p>Poniamo $\\mathbf{u} := \\sum_{i=1}^{r} h_i \\mathbf{b}_i = -\\sum_{i=r'+1}^{n} k_i \\mathbf{b}'_i$ e calcoliamo $\\phi(\\mathbf{u}, \\mathbf{u})$ in due modi.</p>
<p><strong>Primo calcolo</strong> (usando i vettori di $\\mathcal{B}$):</p>
<p>$$\\phi(\\mathbf{u}, \\mathbf{u}) = \\phi\\!\\left(\\sum_{i=1}^{r} h_i \\mathbf{b}_i,\\, \\sum_{i=1}^{r} h_i \\mathbf{b}_i\\right) = \\sum_{i=1}^{r} h_i^2\\, d_i \\ge 0$$</p>
<p>(i termini misti si annullano per ortogonalità di $\\mathcal{B}$).</p>
<p><strong>Secondo calcolo</strong> (usando i vettori di $\\mathcal{B}'$):</p>
<p>$$\\phi(\\mathbf{u}, \\mathbf{u}) = \\phi\\!\\left(-\\sum_{i=r'+1}^{n} k_i \\mathbf{b}'_i,\\, -\\sum_{i=r'+1}^{n} k_i \\mathbf{b}'_i\\right) = \\sum_{i=r'+1}^{n} k_i^2\\, \\phi(\\mathbf{b}'_i, \\mathbf{b}'_i)$$</p>
<p>Poiché $\\phi(\\mathbf{b}'_i, \\mathbf{b}'_i) = 0$ per $i = p+1, \\dots, n$, i termini corrispondenti si annullano e rimane:</p>
<p>$$\\phi(\\mathbf{u}, \\mathbf{u}) = \\sum_{i=r'+1}^{p} k_i^2\\, (-d'_i) \\le 0$$</p>
<p>Da $\\phi(\\mathbf{u}, \\mathbf{u}) \\ge 0$ e $\\phi(\\mathbf{u}, \\mathbf{u}) \\le 0$ si deduce $\\phi(\\mathbf{u}, \\mathbf{u}) = 0$, e in particolare:</p>
<p>$$\\sum_{i=1}^{r} h_i^2\\, d_i = 0$$</p>
<p>Poiché $d_i \\gt 0$ per $1 \\le i \\le r$, tutti gli $h_i$ sono nulli. Dalla relazione (1) segue che anche tutti i $k_i$ sono nulli, e perciò la relazione è banale. $\\mathcal{S}$ è linearmente indipendente.</p>
<p>Poiché in $\\mathcal{S}$ ci sono $r + (n - r') = r + n - r'$ vettori, e questi sono linearmente indipendenti in $\\mathbb{R}^n$, deve essere $r + n - r' \\le n$, cioè:</p>
<p>$$r \\le r'$$</p>
<p><strong>Nota:</strong> qui si usa il fatto che ogni insieme linearmente indipendente in $\\mathbb{R}^n$ ha al più $n$ elementi (conseguenza del Lemma di Steinitz, o equivalentemente del teorema sulla dimensione).</p>
<p>Ripetendo lo stesso ragionamento per il sistema $\\mathcal{S}' := \\{\\mathbf{b}'_1, \\dots, \\mathbf{b}'_{r'},\\, \\mathbf{b}_{r+1}, \\dots, \\mathbf{b}_n\\}$ si prova $r' \\le r$, e dunque $r = r'$. $\\square$</p>`
                }
            ],

            ]
        },

            title: "Invarianti di uno spazio pseudoeuclideo e di una matrice simmetrica",
            icon: "🏷️",
            content: `<p>In base al Teorema di Sylvester la seguente definizione è <strong>ben posta</strong> (cioè non dipende dalla scelta della base ortogonale).</p>`,
            subsections: [
                {
                    subtitle: "Definizione: rango, indice, segnatura",
                    content: `<p>Sia $(V, \\phi)$ uno spazio pseudoeuclideo, $\\mathcal{B}$ una base ortogonale di $V$, e $D$ la matrice (diagonale) di Gram di $\\phi$ rispetto a $\\mathcal{B}$. Si definisce:</p>
<ul>
<li><strong>Rango</strong> di $(V, \\phi)$ = rango di $D$</li>
<li><strong>Indice</strong> di $(V, \\phi)$ = indice di $D$ (numero di componenti positive)</li>
<li><strong>Segnatura</strong> di $(V, \\phi)$ = segnatura di $D$ ($= 2r - p$)</li>
</ul>
<p>Definizioni corrispondenti si hanno per le <strong>forme quadratiche</strong> (rango, indice e segnatura della forma bilineare ottenuta per polarizzazione) e per le <strong>matrici reali simmetriche</strong> (rango, indice e segnatura di una qualunque matrice diagonale congruente).</p>`
                },
                {
                    subtitle: "Esempi di calcolo degli invarianti",
                    content: `<p><strong>(i)</strong> Calcolare rango, indice e segnatura della matrice:</p>
<p>$$G := \\begin{bmatrix} -4 & 0 & 0 \\\\ 0 & 0 & 0 \\\\ 0 & 0 & 9 \\end{bmatrix}$$</p>
<p>La matrice è già diagonale. Sulla diagonale: $-4, 0, 9$. Quindi: <strong>rango</strong> $= 2$, <strong>indice</strong> $= 1$ (una componente positiva: $9$), <strong>segnatura</strong> $= 2 \\cdot 1 - 2 = 0$.</p>
<p><strong>(ii)</strong> Calcolare rango, indice e segnatura della matrice:</p>
<p>$$G := \\begin{bmatrix} 1 & -2 & 3 \\\\ -2 & 6 & -10 \\\\ 3 & -10 & 8 \\end{bmatrix}$$</p>
<p>Occorre diagonalizzare $G$ rispetto alla congruenza. Con l'algoritmo di Gauss-Lagrange, utilizzando le operazioni $e_{21}(2)$, $e_{31}(-3)$, $e^{21}(2)$, $e^{31}(-3)$, $e_{32}(2)$, $e^{32}(2)$ si ottiene:</p>
<p>$$\\begin{bmatrix} 1 & 0 & 0 \\\\ 0 & 2 & 0 \\\\ 0 & 0 & -9 \\end{bmatrix}$$</p>
<p>Dunque $G$ ha <strong>rango</strong> $3$, <strong>indice</strong> $2$ (componenti positive: $1$ e $2$), <strong>segnatura</strong> $= 2 \\cdot 2 - 3 = 1$.</p>
<p><strong>(iii)</strong> Consideriamo lo spazio pseudoeuclideo $(\\mathbb{R}^3, \\phi)$ dove $\\phi$ è definita ponendo:</p>
<p>$$\\phi(\\mathbf{u}, \\mathbf{v}) := x_1 y_1 - 2x_1 y_2 + 3x_1 y_3 - 2x_2 y_1 + 6x_2 y_2 - 10x_2 y_3 + 3x_3 y_1 - 10x_3 y_2 + 8x_3 y_3$$</p>

<p>$$[\\, G \\mid I \\,] = \\begin{bmatrix} 1 & -2 & 3 & 1 & 0 & 0 \\\\ -2 & 6 & -10 & 0 & 1 & 0 \\\\ 3 & -10 & 8 & 0 & 0 & 1 \\end{bmatrix}$$</p>
<p>otteniamo:</p>
<p>$$[\\, D \\mid P^T \\,] = \\begin{bmatrix} 1 & 0 & 0 & 1 & 0 & 0 \\\\ 0 & 2 & 0 & 2 & 1 & 0 \\\\ 0 & 0 & -9 & 1 & 2 & 1 \\end{bmatrix}$$</p>
<p>Lo spazio ha <strong>rango</strong> $3$, <strong>indice</strong> $2$, <strong>segnatura</strong> $1$. Una base ortogonale è $\\mathcal{B} = \\{\\mathbf{e}_1,\\; 2\\mathbf{e}_1 + \\mathbf{e}_2,\\; \\mathbf{e}_1 + 2\\mathbf{e}_2 + \\mathbf{e}_3\\}$.</p>
<p>Nelle coordinate $\\mathbf{x}'$ rispetto a $\\mathcal{B}$ (cioè con la sostituzione $x_1 = x'_1 + 2x'_2 + x'_3$, $x_2 = x'_2 + 2x'_3$, $x_3 = x'_3$):</p>
<p>$$\\phi(\\mathbf{u}, \\mathbf{v}) = x'_1 y'_1 + 2\\, x'_2 y'_2 - 9\\, x'_3 y'_3$$</p>`
                }
