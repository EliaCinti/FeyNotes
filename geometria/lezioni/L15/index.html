            front: "Quando uso il Teorema degli Orlati, basta trovare un orlato singolare per concludere che il rango è $p$?",
            back: "No! Bisogna verificare che TUTTI gli orlati siano singolari. Se anche un solo orlato ha determinante diverso da zero, il rango è almeno $p+1$ e bisogna continuare l'analisi partendo da quel nuovo minore non singolare."
        },
        {
            type: "domanda",
            front: "Qual è la differenza principale tra l'algoritmo di Gauss classico e quello di Gauss-Jordan?",
            back: "Gauss classico riduce la matrice a scala (triangolare superiore). Gauss-Jordan prosegue annullando anche gli elementi sopra i pivot e normalizzando i pivot a 1, trasformando la matrice direttamente nell'identità $I_n$."
        },
        {
            type: "formula",
            front: "Schema sintetico dell'algoritmo di Gauss-Jordan.",
            back: "$$[A \\mid I_n] \\overset{\\text{Gauss-Jordan}}{\\longrightarrow} [I_n \\mid A^{-1}]$$"
        },
        {
            type: "domanda",
            front: "In quale situazione il metodo degli orlati è preferibile al metodo di Gauss per il calcolo del rango?",
            back: "Quando la matrice contiene parametri (es. $k$). Il metodo degli orlati permette di discutere il rango al variare del parametro analizzando quando certi determinanti si annullano, mentre Gauss diventa complicato con i parametri a denominatore."
        }
    ]
};


</script>
