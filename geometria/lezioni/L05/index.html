<li>I vettori canonici (in $\\mathbb{R}^n$, nelle matrici, nei polinomi) sono <strong>sempre l.i.</strong></li>
<li>Se il sistema contiene due vettori uguali ($\\underline{u}_i = \\underline{u}_j$ con $i \\neq j$), è <strong>legato</strong>.</li>
</ul>`

</ul>
<p><strong>Intuizione geometrica:</strong> Due vettori sono dipendenti quando «puntano nella stessa direzione» (giacciono sulla stessa retta). Tre vettori sono dipendenti quando «giacciono sullo stesso piano». In entrambi i casi, uno dei vettori è «di troppo» perché non aggiunge una nuova direzione indipendente.</p>`
