<p>$$[\\vec{u}]_B = \\begin{pmatrix} 2u_1 - u_2 \\\\ -u_1 + u_2 \\end{pmatrix}$$</p>
<p>Questa relazione può essere espressa in <strong>forma matriciale</strong>:</p>
<p>$$[\\vec{u}]_B = \\begin{pmatrix} 2 & -1 \\\\ -1 & 1 \\end{pmatrix} \\begin{pmatrix} u_1 \\\\ u_2 \\end{pmatrix} = \\begin{pmatrix} 2 & -1 \\\\ -1 & 1 \\end{pmatrix} [\\vec{u}]_E$$</p>
<p>La matrice $P = \\begin{pmatrix} 2 & -1 \\\\ -1 & 1 \\end{pmatrix}$ è la <strong>matrice del cambiamento di base</strong> dalla base $E$ alla base $B$.</p>`

<p><strong>Definizione:</strong> Siano $B = \\{\\vec{v}_1, \\dots, \\vec{v}_n\\}$ e $B' = \\{\\vec{v}'_1, \\dots, \\vec{v}'_n\\}$ due basi di uno spazio vettoriale $V$. La <strong>matrice del cambiamento di base</strong> dalla base $B$ alla base $B'$, denotata con $M_{B' \\leftarrow B}(\\text{id}_V)$, è la matrice $n \\times n$ la cui $j$-esima colonna è il vettore delle coordinate di $\\vec{v}_j$ rispetto alla base $B'$:</p>
<p>$$M_{B' \\leftarrow B}(\\text{id}_V) = \\left( [\\vec{v}_1]_{B'} \\mid [\\vec{v}_2]_{B'} \\mid \\dots \\mid [\\vec{v}_n]_{B'} \\right)$$</p>`

            content: `<p>La matrice del cambiamento di base gode di quattro proprietà fondamentali che la rendono uno strumento potente dell'algebra lineare.</p>`,

                    content: `<p><strong>Proposizione:</strong> Siano $B$ e $B'$ due basi di $V$. Per ogni vettore $\\vec{u} \\in V$ vale:</p>
<p>$$[\\vec{u}]_{B'} = M_{B' \\leftarrow B}(\\text{id}_V) \\cdot [\\vec{u}]_B$$</p>
<p><strong>Dimostrazione:</strong> Sia $P = M_{B' \\leftarrow B}(\\text{id}_V)$ e sia $[\\vec{u}]_B = \\boldsymbol{x} = \\begin{pmatrix} x_1 \\\\ \\vdots \\\\ x_n \\end{pmatrix}$. Per definizione, $\\vec{u} = \\sum_{i=1}^n x_i\\,\\vec{v}_i$.</p>
<p>Vogliamo calcolare $[\\vec{u}]_{B'}$. L'applicazione delle coordinate è lineare (lo dimostreremo nella sezione successiva), quindi:</p>
<p>$$[\\vec{u}]_{B'} = \\left[\\sum_{i=1}^n x_i\\,\\vec{v}_i\\right]_{B'} = \\sum_{i=1}^n x_i\\,[\\vec{v}_i]_{B'}$$</p>
<p>Per definizione della matrice $P$, il vettore $[\\vec{v}_i]_{B'}$ è la $i$-esima colonna di $P$, che indichiamo con $\\boldsymbol{p}_i$. L'espressione diventa:</p>
<p>$$\\sum_{i=1}^n x_i\\,\\boldsymbol{p}_i = P \\cdot \\boldsymbol{x}$$</p>
<p>che è esattamente il prodotto matrice-vettore. Abbiamo quindi dimostrato la tesi. $\\square$</p>`

<p>$$\\left( M_{B' \\leftarrow B}(\\text{id}_V) \\right)^{-1} = M_{B \\leftarrow B'}(\\text{id}_V)$$</p>
<p><strong>Dimostrazione:</strong> Siano $P = M_{B' \\leftarrow B}(\\text{id}_V)$ e $Q = M_{B \\leftarrow B'}(\\text{id}_V)$. Dalla proprietà precedente, per ogni $\\vec{u} \\in V$ valgono:</p>

<p>$$[\\vec{u}]_B = Q \\cdot (P \\cdot [\\vec{u}]_B) = (QP) \\cdot [\\vec{u}]_B$$</p>
<p>Questa uguaglianza deve valere per <strong>ogni</strong> vettore $\\vec{u} \\in V$, il che significa che $[\\vec{u}]_B$ può essere un qualsiasi vettore di $\\mathbb{R}^n$. Scegliendo $[\\vec{u}]_B = \\vec{e}_i$, otteniamo $\\vec{e}_i = (QP)\\vec{e}_i$, cioè la $i$-esima colonna di $QP$ è $\\vec{e}_i$. Poiché questo vale per ogni $i$:</p>
<p>$$QP = I$$</p>
<p>Analogamente, sostituendo la seconda relazione nella prima, si ottiene $PQ = I$. Quindi $P$ e $Q$ sono inverse l'una dell'altra. $\\square$</p>`

<p>D'altra parte, per definizione: $[\\vec{u}]_{B''} = M_{B'' \\leftarrow B}(\\text{id}_V) \\cdot [\\vec{u}]_B$.</p>
<p>Confrontando le due espressioni, poiché l'uguaglianza vale per ogni $[\\vec{u}]_B \\in \\mathbb{R}^n$, le matrici devono essere uguali. $\\square$</p>
<p><strong>Nota:</strong> questa proprietà è particolarmente utile in pratica. Quando si deve passare da $B$ a $B''$, si può usare una base intermedia $B'$ (tipicamente la base canonica) per semplificare i calcoli.</p>`

<p>Questo significa che $M_{E \\leftarrow B}$ è la matrice che ha per colonne i vettori di $B$, ed è immediatamente costruibile. Per la matrice inversa $M_{B \\leftarrow E}$, basta invertire questa matrice.</p>
<p>Per passare tra due basi arbitrarie $B$ e $B'$, si usa la base canonica come intermediaria:</p>

<p><strong>Calcolo di $M_{E \\leftarrow B}$:</strong> Le colonne sono $[\\vec{v}_1]_E$ e $[\\vec{v}_2]_E$. Poiché $E$ è la base canonica, le coordinate sono le componenti stesse:</p>
<p>$$M_{E \\leftarrow B} = \\begin{pmatrix} 1 & 1 \\\\ 1 & 2 \\end{pmatrix}$$</p>
<p><strong>Calcolo di $M_{B \\leftarrow E}$:</strong> Per l'invertibilità, questa è l'inversa della precedente:</p>

<p><strong>Verifica:</strong></p>
<p>$$M_{E \\leftarrow B} \\cdot M_{B \\leftarrow E} = \\begin{pmatrix} 1 & 1 \\\\ 1 & 2 \\end{pmatrix} \\begin{pmatrix} 2 & -1 \\\\ -1 & 1 \\end{pmatrix} = \\begin{pmatrix} 2-1 & -1+1 \\\\ 2-2 & -1+2 \\end{pmatrix} = \\begin{pmatrix} 1 & 0 \\\\ 0 & 1 \\end{pmatrix} = I \\quad \\checkmark$$</p>`

<p>$$\\vec{b}'_1 = \\vec{b}_1, \\quad \\vec{b}'_2 = \\vec{b}_2 + 5\\vec{b}_3, \\quad \\vec{b}'_3 = \\vec{b}_2 + 6\\vec{b}_3$$</p>
<p>Sia $\\vec{u} = -2\\vec{b}_1 + 3\\vec{b}_2 - \\vec{b}_3$. Calcolare $M_{B \\leftarrow B'}$, $M_{B' \\leftarrow B}$, $[\\vec{u}]_B$ e $[\\vec{u}]_{B'}$.</p>
<p><strong>Coordinate di $\\vec{u}$ rispetto a $B$:</strong> date direttamente dalla definizione: $[\\vec{u}]_B = \\begin{pmatrix} -2 \\\\ 3 \\\\ -1 \\end{pmatrix}$.</p>
<p><strong>Calcolo di $M_{B \\leftarrow B'}$:</strong> scriviamo le coordinate dei vettori di $B'$ rispetto a $B$:</p>
<p>$$[\\vec{b}'_1]_B = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}, \\quad [\\vec{b}'_2]_B = \\begin{pmatrix} 0 \\\\ 1 \\\\ 5 \\end{pmatrix}, \\quad [\\vec{b}'_3]_B = \\begin{pmatrix} 0 \\\\ 1 \\\\ 6 \\end{pmatrix}$$</p>
<p>$$M_{B \\leftarrow B'} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 1 & 1 \\\\ 0 & 5 & 6 \\end{pmatrix}$$</p>
<p><strong>Calcolo di $M_{B' \\leftarrow B}$:</strong> dobbiamo invertire $M_{B \\leftarrow B'}$. La matrice è triangolare a blocchi: il blocco $(1,1)$ è $1$ e il blocco $2 \\times 2$ in basso a destra è $\\begin{pmatrix} 1 & 1 \\\\ 5 & 6 \\end{pmatrix}$.</p>
<p>Il determinante è $\\det = 1 \\cdot (1 \\cdot 6 - 1 \\cdot 5) = 1 \\cdot 1 = 1$.</p>
<p>Calcoliamo l'inversa con il metodo dei cofattori. La matrice dei cofattori è:</p>
<p>$$C_{11} = +(6-5) = 1, \\quad C_{12} = -(0-0) = 0, \\quad C_{13} = +(0-0) = 0$$</p>
<p>$$C_{21} = -(0-0) = 0, \\quad C_{22} = +(6-0) = 6, \\quad C_{23} = -(5-0) = -5$$</p>
<p>$$C_{31} = +(0-0) = 0, \\quad C_{32} = -(1-0) = -1, \\quad C_{33} = +(1-0) = 1$$</p>
<p>L'inversa è la trasposta della matrice dei cofattori divisa per il determinante (che è 1):</p>
<p>$$M_{B' \\leftarrow B} = (M_{B \\leftarrow B'})^{-1} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 6 & -1 \\\\ 0 & -5 & 1 \\end{pmatrix}$$</p>
<p><strong>Verifica rapida:</strong> $M_{B' \\leftarrow B} \\cdot M_{B \\leftarrow B'} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 6 & -1 \\\\ 0 & -5 & 1 \\end{pmatrix} \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 1 & 1 \\\\ 0 & 5 & 6 \\end{pmatrix} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 6-5 & 6-6 \\\\ 0 & -5+5 & -5+6 \\end{pmatrix} = I \\quad \\checkmark$</p>
<p><strong>Calcolo di $[\\vec{u}]_{B'}$:</strong></p>
<p>$$[\\vec{u}]_{B'} = M_{B' \\leftarrow B} \\cdot [\\vec{u}]_B = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 6 & -1 \\\\ 0 & -5 & 1 \\end{pmatrix} \\begin{pmatrix} -2 \\\\ 3 \\\\ -1 \\end{pmatrix} = \\begin{pmatrix} -2 \\\\ 18+1 \\\\ -15-1 \\end{pmatrix} = \\begin{pmatrix} -2 \\\\ 19 \\\\ -16 \\end{pmatrix}$$</p>`
                },
                {
                    subtitle: "Esempio 3: Cambio tra due basi non canoniche in ℝ²",
                    content: `<p>In $\\mathbb{R}^2$, siano $B = \\{(2,2), (2,3)\\}$ e $B' = \\{(1,1), (5,6)\\}$. Un vettore $\\vec{u}$ ha coordinate $[\\vec{u}]_B = \\begin{pmatrix} 5 \\\\ -4 \\end{pmatrix}$. Calcolare $[\\vec{u}]_{B'}$.</p>
<p>Usiamo la base canonica $E$ come intermediaria: $M_{B' \\leftarrow B} = M_{B' \\leftarrow E} \\cdot M_{E \\leftarrow B}$.</p>

<p><strong>Passo 2:</strong> $M_{B' \\leftarrow E} = (M_{E \\leftarrow B'})^{-1}$. Il determinante di $M_{E \\leftarrow B'} = \\begin{pmatrix} 1 & 5 \\\\ 1 & 6 \\end{pmatrix}$ è $6-5 = 1$, quindi:</p>
<p>$$M_{B' \\leftarrow E} = \\begin{pmatrix} 6 & -5 \\\\ -1 & 1 \\end{pmatrix}$$</p>
<p><strong>Passo 3:</strong> Moltiplichiamo:</p>
<p>$$M_{B' \\leftarrow B} = \\begin{pmatrix} 6 & -5 \\\\ -1 & 1 \\end{pmatrix} \\begin{pmatrix} 2 & 2 \\\\ 2 & 3 \\end{pmatrix} = \\begin{pmatrix} 12-10 & 12-15 \\\\ -2+2 & -2+3 \\end{pmatrix} = \\begin{pmatrix} 2 & -3 \\\\ 0 & 1 \\end{pmatrix}$$</p>
<p><strong>Passo 4:</strong> Calcoliamo le coordinate:</p>
<p>$$[\\vec{u}]_{B'} = \\begin{pmatrix} 2 & -3 \\\\ 0 & 1 \\end{pmatrix} \\begin{pmatrix} 5 \\\\ -4 \\end{pmatrix} = \\begin{pmatrix} 10+12 \\\\ 0-4 \\end{pmatrix} = \\begin{pmatrix} 22 \\\\ -4 \\end{pmatrix}$$</p>`

<p>$$\\begin{cases} x'_1 = x_1 \\\\ x'_2 = 2x_2 + 5x_3 \\\\ x'_3 = x_2 + 3x_3 \\end{cases}$$</p>
<p>Determinare i vettori della base $B'$.</p>

<p>$$M_{B' \\leftarrow B} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 2 & 5 \\\\ 0 & 1 & 3 \\end{pmatrix}$$</p>
<p><strong>Idea chiave:</strong> per definizione, le coordinate del $j$-esimo vettore di una base rispetto alla propria base sono il $j$-esimo vettore canonico. Cioè $[\\vec{b}'_i]_{B'} = \\vec{e}_i$. Questo perché $\\vec{b}'_j = 0 \\cdot \\vec{b}'_1 + \\dots + 1 \\cdot \\vec{b}'_j + \\dots + 0 \\cdot \\vec{b}'_n$.</p>
<p>Quindi, per trovare $[\\vec{b}'_i]_B$ (le coordinate dei vettori di $B'$ nella base $B$), usiamo la relazione inversa:</p>
<p>$$[\\vec{b}'_i]_B = M_{B \\leftarrow B'} \\cdot [\\vec{b}'_i]_{B'} = M_{B \\leftarrow B'} \\cdot \\vec{e}_i$$</p>
<p>cioè le colonne di $M_{B \\leftarrow B'} = (M_{B' \\leftarrow B})^{-1}$.</p>
<p>Calcoliamo l'inversa:</p>
<p>$$M_{B \\leftarrow B'} = (M_{B' \\leftarrow B})^{-1} = \\begin{pmatrix} 1 & 0 & 0 \\\\ 0 & 3 & -5 \\\\ 0 & -1 & 2 \\end{pmatrix}$$</p>
<p><strong>Per $\\vec{b}'_1$:</strong> $[\\vec{b}'_1]_B = \\begin{pmatrix} 1 \\\\ 0 \\\\ 0 \\end{pmatrix}$, quindi $\\vec{b}'_1 = 1 \\cdot \\vec{b}_1 = (0,1,1)$.</p>
<p><strong>Per $\\vec{b}'_2$:</strong> $[\\vec{b}'_2]_B = \\begin{pmatrix} 0 \\\\ 3 \\\\ -1 \\end{pmatrix}$, quindi $\\vec{b}'_2 = 3\\vec{b}_2 - \\vec{b}_3 = 3(0,1,2) - (1,1,1) = (-1,2,5)$.</p>
<p><strong>Per $\\vec{b}'_3$:</strong> $[\\vec{b}'_3]_B = \\begin{pmatrix} 0 \\\\ -5 \\\\ 2 \\end{pmatrix}$, quindi $\\vec{b}'_3 = -5\\vec{b}_2 + 2\\vec{b}_3 = -5(0,1,2) + 2(1,1,1) = (2,-3,-8)$.</p>
<p>La base cercata è $B' = \\{(0,1,1),\\, (-1,2,5),\\, (2,-3,-8)\\}$.</p>`
                }
            ]

            content: `<p>Fissata una base $B$ di uno spazio vettoriale $V$ di dimensione $n$, possiamo considerare l'applicazione:</p>
<p>$$[\\cdot]_B : V \\to \\mathbb{R}^n, \\quad \\vec{u} \\mapsto [\\vec{u}]_B$$</p>
<p>Questa è detta <strong>applicazione delle coordinate</strong> di $V$ rispetto alla base $B$. Il suo interesse risiede nel fatto che permette di "identificare" lo spazio vettoriale astratto $V$ con lo spazio numerico $\\mathbb{R}^n$.</p>`,
            subsections: [
                {
                    subtitle: "Proprietà fondamentali (con dimostrazione)",
                    content: `<p><strong>Proposizione (Proprietà dell'applicazione delle coordinate):</strong> L'applicazione $[\\cdot]_B$ gode delle seguenti proprietà:</p>
<p><strong>1. Biettività:</strong> $[\\cdot]_B$ è biiettiva (ogni vettore di $\\mathbb{R}^n$ corrisponde a un unico vettore di $V$).</p>
<p><strong>2. Additività:</strong> Per ogni $\\vec{u}, \\vec{w} \\in V$, si ha $[\\vec{u}+\\vec{w}]_B = [\\vec{u}]_B + [\\vec{w}]_B$.</p>
<p><strong>3. Omogeneità:</strong> Per ogni $\\vec{u} \\in V$ e ogni scalare $a \\in \\mathbb{R}$, si ha $[a\\vec{u}]_B = a[\\vec{u}]_B$.</p>
<p>Le proprietà 2 e 3 insieme ci dicono che l'applicazione delle coordinate è un'<strong>applicazione lineare</strong>. Insieme alla proprietà 1, questo significa che $[\\cdot]_B$ è un <strong>isomorfismo</strong> tra $V$ e $\\mathbb{R}^n$.</p>
<p><strong>Dimostrazione di 2 e 3:</strong> Siano $\\vec{u}, \\vec{w} \\in V$ con coordinate:</p>
<p>$$\\vec{u} = \\sum_{i=1}^n x_i\\,\\vec{v}_i \\quad \\text{e} \\quad \\vec{w} = \\sum_{i=1}^n y_i\\,\\vec{v}_i$$</p>
<p>Per l'<strong>additività</strong>: sommando le due espressioni si ottiene:</p>
<p>$$\\vec{u} + \\vec{w} = \\sum_{i=1}^n x_i\\,\\vec{v}_i + \\sum_{i=1}^n y_i\\,\\vec{v}_i = \\sum_{i=1}^n (x_i + y_i)\\,\\vec{v}_i$$</p>
<p>Per l'unicità delle coordinate, questo significa che $[\\vec{u}+\\vec{w}]_B = \\begin{pmatrix} x_1+y_1 \\\\ \\vdots \\\\ x_n+y_n \\end{pmatrix} = [\\vec{u}]_B + [\\vec{w}]_B$.</p>
<p>Per l'<strong>omogeneità</strong>: moltiplicando per lo scalare $a$:</p>
<p>$$a\\vec{u} = a\\sum_{i=1}^n x_i\\,\\vec{v}_i = \\sum_{i=1}^n (ax_i)\\,\\vec{v}_i$$</p>
<p>Dunque $[a\\vec{u}]_B = \\begin{pmatrix} ax_1 \\\\ \\vdots \\\\ ax_n \\end{pmatrix} = a\\begin{pmatrix} x_1 \\\\ \\vdots \\\\ x_n \\end{pmatrix} = a[\\vec{u}]_B$. $\\square$</p>`
