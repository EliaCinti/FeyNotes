<li><strong>Molteplicità 3</strong> $\\Rightarrow$ 3 modi: $a^t, \\; t\\, a^t, \\; t^2 a^t$</li>
<li><strong>Molteplicità n</strong> $\\Rightarrow$ n modi: $a^t, \\; t\\, a^t, \\; t^2 a^t, \\; \\dots, \\; t^{n-1} a^t$</li>

<li><strong>Molteplicità 2</strong> $\\Rightarrow$ 2 modi: $\\delta_0(t), \\; \\delta_0(t-1)$</li>
<li><strong>Molteplicità n</strong> $\\Rightarrow$ n modi: $\\delta_0(t), \\; \\delta_0(t-1), \\; \\dots, \\; \\delta_0(t-n+1)$</li>

<li><strong>Molteplicità m</strong>: la coppia di sopra moltiplicata per $1, t, \\dots, t^{m-1}$</li>

            content: `<p>La particolare dipende dalla <strong>forma dell'ingresso</strong>. Prima di partire, fai sempre il check della risonanza.</p>

<ul>
<li>$\\Delta \\;\\rightarrow\\;$ in $Y_p$ sostituisci $t$ con $t+1$</li>
<li>$\\Delta^2 \\;\\rightarrow\\;$ in $Y_p$ sostituisci $t$ con $t+2$</li>
<li>$\\Delta^k \\;\\rightarrow\\;$ in $Y_p$ sostituisci $t$ con $t+k$</li>
<li>costante $\\;\\rightarrow\\;$ lascia $Y_p$ non shiftata</li>

<li>Costruisci un sistema lineare nelle lettere $A, B, C, \\dots$ e risolvilo.</li>

<p>L'argomento di $\\cos$ e $\\sin$ deve essere lo <strong>stesso</strong> dell'ingresso ($\\omega$ uguale). La ragione qui è la formula di addizione: $\\sin(\\omega(t+1)) = \\sin(\\omega t)\\cos\\omega + \\cos(\\omega t)\\sin\\omega$, lo shift mescola seno e coseno esattamente come la derivata nel continuo.</p>`
