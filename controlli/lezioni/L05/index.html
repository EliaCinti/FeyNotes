<li>Calcola le radici di $p(\\Delta) = 0$.</li>
<li>Confronta le radici con la <strong>tabella dei modi</strong> e ricava i modi corrispondenti.</li>

                    content: `<ul>

<li><strong>Molteplicità 2</strong> $\\Rightarrow$ 2 modi: $e^{at}, \\; t\\, e^{at}$</li>
<li><strong>Molteplicità 3</strong> $\\Rightarrow$ 3 modi: $e^{at}, \\; t\\, e^{at}, \\; t^2 e^{at}$</li>
<li><strong>Molteplicità n</strong> $\\Rightarrow$ n modi: $e^{at}, \\; t\\, e^{at}, \\; t^2 e^{at}, \\; \\dots, \\; t^{n-1} e^{at}$</li>

                    subtitle: "Caso speciale a = 0",
                    content: `<ul>
<li><strong>Molteplicità 1</strong> $\\Rightarrow$ 1 modo: $1$</li>
<li><strong>Molteplicità 2</strong> $\\Rightarrow$ 2 modi: $1, \\; t$</li>
<li><strong>Molteplicità n</strong> $\\Rightarrow$ n modi: $1, \\; t, \\; t^2, \\; \\dots, \\; t^{n-1}$</li>
</ul>`
                }
            ],
            formulas: [
                { label: "Forma della soluzione omogenea", latex: "Y_{g,o}(t) = c_1 \\, m_1(t) + c_2 \\, m_2(t) + \\dots + c_n \\, m_n(t)" },
                { label: "Radice reale semplice", latex: "a \\in \\mathbb{R} \\;(\\text{molt. } 1) \\Rightarrow e^{at}" },
                { label: "Radice complessa coniugata", latex: "a \\pm i b \\Rightarrow e^{at}\\cos(bt), \\; e^{at}\\sin(bt)" }
            ]
        },
        {
            id: "s05-step2-particolare",
            type: "section",
            title: "STEP 2 — Soluzione Particolare Y_p (senza risonanza)",
            icon: "🎯",
            content: `<p>La particolare dipende dalla <strong>forma dell'ingresso</strong>. Prima di partire, fai un controllo fondamentale.</p>
<p><strong>Check risonanza:</strong> guarda i modi dell'omogenea. Se l'ingresso $u(t)$ ha la stessa forma di uno dei modi presenti in $Y_{g,o}$ $\\Rightarrow$ <strong>risonanza</strong>: vai allo STEP 2.1. Altrimenti procedi qui.</p>`,
            subsections: [

                    subtitle: "Scorciatoia: ingresso esponenziale puro",
                    content: `<p>Se $u(t) = e^{bt}$ <strong>e</strong> $b$ <strong>non è una radice</strong> di $p(\\Delta)$, allora la particolare si calcola con una sola sostituzione:</p>
<p>$$Y_p = \\frac{1}{p(b)}\\, e^{bt}$$</p>
<p>dove $p(b)$ significa "sostituisci $b$ al posto di $\\Delta$ nel polinomio". Niente derivate, niente sistemi.</p>`

<li><strong>Ipotizza</strong> $Y_p$ come un polinomio generico dello <strong>stesso grado e forma</strong> dell'ingresso, con coefficienti incogniti (lettere $A, B, C, \\dots$).</li>
<li>Sia $n$ il grado di $p(\\Delta)$. Calcola le <strong>$n$ derivate</strong> di $Y_p$.</li>
<li><strong>Sostituisci</strong> in $p(\\Delta)$:
<ul>
<li>$\\Delta \\;\\rightarrow\\;$ derivata prima di $Y_p$</li>
<li>$\\Delta^2 \\;\\rightarrow\\;$ derivata seconda di $Y_p$</li>
<li>$\\Delta^k \\;\\rightarrow\\;$ derivata $k$-esima di $Y_p$</li>
<li>costante $\\;\\rightarrow\\;$ $Y_p$ non derivata</li>
</ul></li>
<li>Eguaglia il risultato all'<strong>ingresso</strong> $u(t)$ e costruisci un sistema lineare per trovare le lettere.</li>
<li>Sostituisci i valori trovati nell'ipotesi: ottieni $Y_p$.</li>
</ol>`

                    subtitle: "Caso ingresso sinusoidale",

<p>$$Y_p = A \\cos(\\omega t) + B \\sin(\\omega t)$$</p>
<p>L'argomento di $\\cos$ e $\\sin$ deve essere lo <strong>stesso</strong> dell'ingresso ($\\omega$ uguale).</p>`
                }
            ],

                { label: "Scorciatoia esponenziale (no risonanza)", latex: "u(t) = e^{bt} \\;\\Rightarrow\\; Y_p = \\tfrac{1}{p(b)}\\, e^{bt}" },
                { label: "Ipotesi per ingresso sinusoidale", latex: "Y_p = A \\cos(\\omega t) + B \\sin(\\omega t)" },
                { label: "Sostituzione operatore Δ", latex: "\\Delta^k \\;\\longleftrightarrow\\; \\tfrac{d^k}{dt^k}" }

<p>Restano da determinare le costanti $c_1, c_2, \\dots, c_n$ usando le <strong>condizioni iniziali</strong> $y_0, y_1, \\dots, y_{n-1}$.</p>`,

<li>Costruisci un sistema di $n$ equazioni:
<ul>
<li>$Y_{g,no}(t) = y_0$</li>
<li>$\\dot{Y}_{g,no}(t) = y_1$</li>
<li>$\\ddot{Y}_{g,no}(t) = y_2$</li>
<li>$\\dots$</li>
<li>$Y_{g,no}^{(n-1)}(t) = y_{n-1}$</li>
</ul></li>
<li><strong>Poni $t = 0$</strong> in tutte le equazioni.</li>
<li>Risolvi il sistema lineare per le costanti $c_i$.</li>
<li>Sostituisci i valori trovati in $Y_{g,no}$: questa è la soluzione finale $Y(t)$.</li>
</ol>`

            id: "s05-step4-libera",

<li><strong>STEP 2:</strong> Verifica risonanza. Se ingresso $= e^{bt}$ senza risonanza usa $Y_p = \\tfrac{1}{p(b)} e^{bt}$. Altrimenti ipotizza, deriva $n$ volte, sostituisci in $p(\\Delta)$, costruisci il sistema e trova le lettere.</li>

<li><strong>STEP 3:</strong> $Y_{g,no} = Y_{g,o} + Y_p$. Calcola $n-1$ derivate, imponi le condizioni iniziali in $t = 0$, risolvi il sistema per le $c_i$, sostituisci $\\rightarrow$ ottieni $Y(t)$.</li>

<p>Risposta attesa:</p>

</ol>`

            back: "$Y_p = \\dfrac{1}{p(b)}\\, e^{bt}$, dove $p(b)$ significa sostituire $b$ al posto di $\\Delta$ nel polinomio. Vale solo se $b$ <strong>non</strong> è radice di $p(\\Delta) = 0$ (altrimenti c'è risonanza e $p(b) = 0$ porta a divisione per zero)."
        },
        {
            type: "tranello",
            front: "Ingresso sin(ωt): cosa devo ipotizzare per Y_p?",
            back: "<strong>Sempre entrambi</strong>: $Y_p = A \\cos(\\omega t) + B \\sin(\\omega t)$, con la stessa $\\omega$ dell'ingresso. Errore frequente: ipotizzare solo $B \\sin(\\omega t)$ — derivando compaiono coseni e il sistema risulta inconsistente."
        },
        {
            type: "domanda",
            front: "Cos'è la risonanza e come si tratta?",
            back: "Risonanza = l'ingresso $u(t)$ ha la stessa forma di un modo di $Y_{g,o}$. Trattamento: ipotizza $Y_p$ come se non ci fosse risonanza, poi <strong>moltiplica per $t$</strong> finché il modo non coincide più con nessuno di quelli omogenei. Poi prosegui con derivate e sistema."
        },
        {
            type: "domanda",
            front: "Come si calcolano le costanti c_i nella generale non omogenea?",
            back: "Sia $n$ il grado di $p(\\Delta)$. Calcolo $n-1$ derivate di $Y_{g,no}$, costruisco un sistema con $Y_{g,no}^{(k)}(0) = y_k$ per $k = 0, \\dots, n-1$, pongo $t = 0$ e risolvo il sistema lineare. I valori trovati si sostituiscono in $Y_{g,no}$ per ottenere $Y(t)$."
        },
        {
            type: "definizione",
            front: "Differenza tra risposta libera Y_L e risposta forzata Y_F?",
            back: "<strong>$Y_L$</strong>: parte di $Y(t)$ dovuta alle condizioni iniziali (ingresso nullo, condizioni iniziali date). Si ottiene da $Y(t)$ tenendo solo i termini con le $y_k$. <strong>$Y_F$</strong>: parte dovuta all'ingresso (condizioni iniziali nulle, ingresso dato). Si ottiene da $Y(t)$ ponendo tutte le $y_k = 0$. Verifica: $Y_L + Y_F = Y(t)$."
        },
        {
            type: "dimostrazione",
            front: "Esempio: $(\\Delta^2 - 3\\Delta + 2)\\, y(t) = e^{3t}$. Trova Y_{g,no}.",

        }
    ]
